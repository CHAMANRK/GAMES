<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise Farhan 🎉</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== BACKGROUND ===== */
body{
  min-height:100vh;
  background: radial-gradient(circle at top, #1a0033, #000);
  overflow:hidden;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== FLOATING STARS ===== */
.stars span{
  position:absolute;
  width:3px;
  height:3px;
  background:#fff;
  border-radius:50%;
  animation: float 10s linear infinite;
  opacity:0.7;
}
@keyframes float{
  from{ transform: translateY(100vh); }
  to{ transform: translateY(-10vh); }
}

/* ===== MAIN CARD ===== */
.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius:20px;
  padding:40px 30px;
  max-width:420px;
  text-align:center;
  box-shadow: 0 0 40px rgba(0,255,255,0.25);
  animation: pop 1.2s ease;
}
@keyframes pop{
  from{ transform: scale(0.7); opacity:0; }
  to{ transform: scale(1); opacity:1; }
}

/* ===== GLOWING NAME ===== */
.name{
  font-size:2.2rem;
  font-weight:800;
  background: linear-gradient(90deg,#00ffe7,#7f00ff,#00ffe7);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: glow 4s infinite linear;
}
@keyframes glow{
  0%{ background-position:0%; }
  100%{ background-position:300%; }
}

/* ===== SUBTEXT ===== */
.sub{
  margin-top:10px;
  font-size:1.05rem;
  opacity:0.85;
}

/* ===== MESSAGE ===== */
.message{
  margin:25px 0;
  line-height:1.6;
  font-size:1rem;
}

/* ===== HEART ===== */
.heart{
  font-size:2.5rem;
  color:#ff4d6d;
  animation: beat 1s infinite;
}
@keyframes beat{
  0%,100%{ transform: scale(1); }
  50%{ transform: scale(1.25); }
}

/* ===== BUTTON ===== */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 28px;
  border-radius:30px;
  background: linear-gradient(135deg,#00ffe7,#7f00ff);
  color:#000;
  font-weight:700;
  text-decoration:none;
  box-shadow: 0 0 20px rgba(0,255,255,0.6);
  transition:0.3s;
}
.btn:hover{
  transform: translateY(-3px);
  box-shadow: 0 0 35px rgba(127,0,255,0.9);
}

/* ===== FOOTER ===== */
.footer{
  margin-top:25px;
  font-size:0.85rem;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- Stars -->
<div class="stars">
  <span style="left:5%; animation-duration:8s;"></span>
  <span style="left:15%; animation-duration:12s;"></span>
  <span style="left:30%; animation-duration:9s;"></span>
  <span style="left:50%; animation-duration:14s;"></span>
  <span style="left:70%; animation-duration:10s;"></span>
  <span style="left:85%; animation-duration:11s;"></span>
</div>

<!-- Card -->
<div class="card">
  <div class="name">Farhan Mujtaba</div>
  <div class="sub">This page exists only for you ✨</div>

  <div class="message">
    You’re not just a friend,  
    you’re a **rare combination of strength, kindness & ambition**.  
    <br><br>
    Whatever you’re chasing in life —  
    **success is already chasing you back.**
  </div>

  <div class="heart">❤️</div>

  <a href="#" class="btn">Never Stop Being You</a>

  <div class="footer">
    Made with respect & creativity
  </div>
</div>

</body>
</html>
