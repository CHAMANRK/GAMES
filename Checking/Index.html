<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate for Education</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family: Arial;
  background:#f2f2f2;
}
.card{
  max-width:400px;
  margin:40px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
button{
  background:#0a8f08;
  color:white;
  border:none;
  padding:15px;
  width:100%;
  font-size:18px;
  border-radius:8px;
}
</style>
</head>
<body>

<div class="card">
  <h2>Support My Education</h2>
  <p>
    I am a hardworking student. Due to financial issues,
    I need your support to continue my studies.
  </p>

  <p><b>Goal:</b> ₹1,00,000</p>

  <button onclick="donate()">❤️ Donate Now</button>

  <p style="font-size:12px;margin-top:10px;">
    Secure payment via UPI / Card / Netbanking
  </p>
</div>

<script>
function donate(){
  window.location.href = "https://rzp.io/i/YOUR_LINK_HERE";
}
</script>

</body>
</html>
