<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Najiful Quran Game | Neon Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@700&family=Orbitron:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= SPLASH SCREEN ================= -->
<section id="splashScreen" class="screen active">
  <div class="splash-inner">
    <h1 class="neon-title">NAJIFUL</h1>
    <p class="neon-sub">QURAN GAME ARENA</p>

    <div class="loading-bar">
      <span></span>
    </div>

    <button class="btn btn-enter" onclick="showScreen('modeScreen')">
      ▶ ENTER ARENA
    </button>
  </div>
</section>

<!-- ================= MODE SELECTION ================= -->
<section id="modeScreen" class="screen">
  <div class="card neon-card">
    <h2 class="screen-title">SELECT GAME MODE</h2>

    <div class="mode-cards">
      <div class="mode-card active" data-mode="practice">
        <h3>🎯 PRACTICE</h3>
        <p>No pressure. Learn & test.</p>
      </div>

      <div class="mode-card" data-mode="timed">
        <h3>⏱ TIMED</h3>
        <p>Beat the clock.</p>
      </div>

      <div class="mode-card" data-mode="survival">
        <h3>💀 SURVIVAL</h3>
        <p>One mistake = Game Over.</p>
      </div>
    </div>

    <button class="btn btn-next" onclick="showScreen('difficultyScreen')">
      NEXT ➜
    </button>
  </div>
</section>

<!-- ================= DIFFICULTY SCREEN ================= -->
<section id="difficultyScreen" class="screen">
  <div class="card neon-card">
    <h2 class="screen-title">SELECT DIFFICULTY</h2>

    <div class="difficulty-cards">
      <div class="difficulty-card active" data-level="easy">
        EASY
      </div>
      <div class="difficulty-card" data-level="medium">
        MEDIUM
      </div>
      <div class="difficulty-card" data-level="hard">
        HARD
      </div>
    </div>

    <button class="btn btn-back" onclick="showScreen('modeScreen')">
      ⬅ BACK
    </button>
    <button class="btn btn-next" onclick="showScreen('paraScreen')">
      NEXT ➜
    </button>
  </div>
</section>

<!-- ================= PARA SELECTION ================= -->
<section id="paraScreen" class="screen">
  <div class="card neon-card">
    <h2 class="screen-title">SELECT PARA RANGE</h2>

    <div class="para-select">
      <input type="number" id="fromPara" min="1" max="30" placeholder="From Para">
      <input type="number" id="toPara" min="1" max="30" placeholder="To Para">
    </div>

    <button class="btn btn-back" onclick="showScreen('difficultyScreen')">
      ⬅ BACK
    </button>
    <button class="btn btn-start" onclick="showScreen('quizScreen')">
      🚀 START GAME
    </button>
  </div>
</section>

<!-- ================= QUIZ SCREEN ================= -->
<section id="quizScreen" class="screen">
  <div class="card neon-card quiz-card">

    <div class="quiz-top">
      <div id="quizProgress">Q 1 / 10</div>
      <div id="timer" class="timer">30</div>
    </div>

    <div id="ayatText" class="ayat-box">
      Loading Ayat...
    </div>

    <div class="hint-zone">
      <button id="hintBtn" class="btn-hint">💡 HINT</button>
      <span id="hintInfo"></span>
    </div>

    <form id="answerForm">
      <input type="number" placeholder="Para Number" required>
      <input type="number" placeholder="Page in Para">
      <button class="btn btn-check" type="submit">
        CHECK ANSWER
      </button>
    </form>

    <div id="resultBox" class="result-box"></div>

    <button class="btn btn-next hidden">
      NEXT QUESTION ➜
    </button>
  </div>
</section>

<!-- ================= GAME OVER ================= -->
<section id="gameOverScreen" class="screen">
  <div class="card neon-card">
    <h2 class="screen-title">GAME OVER</h2>

    <div class="stats">
      <p>Score: <span id="finalScore">0</span></p>
      <p>Accuracy: <span id="accuracy">0%</span></p>
      <p>Streak: <span id="maxStreak">0</span></p>
    </div>

    <button class="btn btn-retry" onclick="showScreen('modeScreen')">
      🔄 PLAY AGAIN
    </button>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="game-footer">
  <p>© 2025 • Najiful</p>
</footer>

<!-- JS FILES -->
<script src="js/app.js"></script>
<script src="js/quiz.js"></script>

</body>
</html>
