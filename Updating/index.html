<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Najiful Quran Game | Neon Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@700&family=Orbitron:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="sound-on">

<div id="soundToggle" onclick="UI.toggleSound()" title="Toggle Sound">🔊</div>

<section id="splashScreen" class="screen active">
  <div class="splash-inner">
    <h1 class="neon-title">NAJIFUL</h1>
    <p class="neon-sub">QURAN GAME ARENA</p>
    <div class="loading-bar"><span></span></div>
    <button class="btn btn-enter" onclick="UI.showScreen('modeScreen')">▶ ENTER ARENA</button>
  </div>
</section>

<section id="modeScreen" class="screen">
  <div class="card neon-card">
    <h2 class="screen-title">SELECT MODE</h2>
    <div class="mode-cards">
      <div class="mode-card active" onclick="Quiz.selectMode(this, 'practice')">🎯 PRACTICE</div>
      <div class="mode-card" onclick="Quiz.selectMode(this, 'timed')">⏱ TIMED</div>
      <div class="mode-card" onclick="Quiz.selectMode(this, 'survival')">💀 SURVIVAL</div>
    </div>
    <button class="btn btn-next" onclick="UI.showScreen('paraScreen')">NEXT ➜</button>
  </div>
</section>

<section id="paraScreen" class="screen">
  <div class="card neon-card">
    <h2 class="screen-title">PARA RANGE</h2>
    <div class="para-select">
      <input type="number" id="fromPara" min="1" max="30" placeholder="From (1)">
      <input type="number" id="toPara" min="1" max="30" placeholder="To (30)">
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-back" onclick="UI.showScreen('modeScreen')">⬅ BACK</button>
        <button class="btn btn-start" onclick="Quiz.start()">🚀 START GAME</button>
    </div>
  </div>
</section>

<section id="quizScreen" class="screen">
  <div id="streakBadge"></div>
  <div class="card neon-card quiz-card" id="mainQuizCard">
    <div class="quiz-top">
      <div id="quizProgress">Q 1 / 10</div>
      <div id="timer" class="timer">30</div>
    </div>
    <div id="ayatText" class="ayat-box" dir="rtl">Loading...</div>
    <form id="answerForm" onsubmit="Quiz.handleAnswer(event)">
      <input type="number" id="userParaInput" placeholder="Enter Para Number" required>
      <button class="btn btn-check" type="submit">CHECK ANSWER</button>
    </form>
    <div id="resultMessage" class="result-box"></div>
    <button id="nextBtn" class="btn btn-next hidden" onclick="Quiz.next()">NEXT QUESTION ➜</button>
  </div>
</section>

<section id="gameOverScreen" class="screen">
    <div class="card neon-card">
      <h2 class="screen-title">GAME OVER</h2>
      <div id="finalStats" style="text-align:center;"></div>
      <button class="btn" onclick="location.reload()">🔄 RESTART</button>
    </div>
</section>

<audio id="bgMusic" src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibe-130.mp3" loop></audio>
<audio id="heartbeat" src="https://www.soundjay.com/human/heartbeat-01.mp3" loop></audio>

<script src="js/app.js"></script>
</body>
</html>
