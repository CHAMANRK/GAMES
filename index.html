<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="logo-192.png">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaman Hub | Najiful Official</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');

:root{
--primary:#00f5ff;
--secondary:#7f00ff;
--glass:rgba(255,255,255,0.05);
--wa:#25D366;
--ig:#d62976;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
min-height:100vh;
background:radial-gradient(circle,#10102a,#050505);
font-family:'Rajdhani',sans-serif;
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding-bottom:200px;
overflow-x:hidden;
}

/* ANIMATIONS */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes floatSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* HEADER */
header{
width:100%;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand-logo{
font-family:'Orbitron',sans-serif;
color:var(--primary);
letter-spacing:2px;
animation:floatSlow 4s infinite;
}

/* INFO BUTTON */
.info-btn{
width:28px;height:28px;
border-radius:50%;
border:1px solid var(--primary);
color:var(--primary);
display:flex;align-items:center;justify-content:center;
cursor:pointer;font-weight:bold;
}

/* TITLE */
.main-title{
font-family:'Bungee Shade',cursive;
font-size:clamp(30px,10vw,60px);
margin-top:50px;
text-shadow:0 0 20px var(--primary);
animation:float 3s infinite;
}

/* CONTAINER */
.container{
width:90%;max-width:400px;
margin-top:30px;
padding:25px;
background:var(--glass);
backdrop-filter:blur(20px);
border-radius:20px;
border:1px solid rgba(0,245,255,.2);
animation:floatSlow 5s infinite;
}

.menu-list{list-style:none}
.menu-list li{margin-bottom:15px}

.menu-list a{
display:flex;
align-items:center;
gap:10px;
padding:14px 18px;
text-decoration:none;
color:#fff;
background:rgba(255,255,255,0.03);
border-radius:12px;
border:1px solid rgba(255,255,255,.05);
font-family:'Orbitron',sans-serif;
transition:.3s;
}

.menu-list a:hover{
background:linear-gradient(90deg,var(--secondary),var(--primary));
transform:scale(1.05);
box-shadow:0 0 20px var(--primary);
}

/* STATUS */
.status{
margin-left:auto;
font-size:10px;
padding:3px 6px;
border-radius:6px;
}
.online{background:#00c853}
.maintenance{background:#d50000}

/* FOOTER TEXT */
.footer-text{
margin-top:15px;
font-size:10px;
letter-spacing:2px;
opacity:.4;
text-align:center;
}

/* INFO MODAL */
.info-modal{
position:fixed;inset:0;
background:rgba(0,0,0,.6);
backdrop-filter:blur(8px);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.info-box{
background:#0b0b1a;
border:1px solid var(--primary);
border-radius:16px;
padding:20px;
width:85%;max-width:360px;
text-align:center;
}

.info-box h3{color:var(--primary)}
.info-box button{
margin-top:15px;
padding:8px 16px;
border:none;border-radius:10px;
background:var(--primary);
cursor:pointer;
}

/* SOCIAL FOOTER (ORIGINAL) */
.social-footer{
position:fixed;
bottom:0;left:0;
width:100%;height:180px;
display:flex;
justify-content:center;
align-items:flex-end;
gap:30px;
padding-bottom:20px;
background:linear-gradient(to top,#020205 20%,transparent);
z-index:100;
}

.light-button{position:relative;width:80px;height:150px}
.button-holder{
height:70px;width:70px;
background:#0a0a0a;
border-radius:12px;
display:flex;align-items:center;justify-content:center;
outline:#111 2px solid;
outline-offset:8px;
transition:.3s;
cursor:pointer;
}
.button-holder svg{height:30px;fill:#555;transition:.3s}

.light-holder{position:absolute;top:0;width:80px;height:150px;pointer-events:none}
.dot{
position:absolute;top:0;
width:8px;height:8px;border-radius:50%;
opacity:0;transition:.3s;
}
.light{
position:absolute;top:0;
width:100px;height:120px;
clip-path:polygon(50% 0%,20% 100%,80% 100%);
opacity:0;transition:.3s;
}

/* WHATSAPP */
.whatsapp:hover .button-holder{outline-color:var(--wa)}
.whatsapp:hover svg{fill:var(--wa)}
.whatsapp .dot{background:var(--wa);box-shadow:0 0 15px var(--wa)}
.whatsapp .light{background:linear-gradient(180deg,rgba(37,211,102,.5),transparent)}

/* INSTAGRAM */
.instagram:hover .button-holder{outline-color:var(--ig)}
.instagram:hover svg{fill:var(--ig)}
.instagram .dot{background:var(--ig);box-shadow:0 0 15px var(--ig)}
.instagram .light{background:linear-gradient(180deg,rgba(214,41,118,.6),transparent)}

.light-button:hover .dot,
.light-button:hover .light{opacity:1}

/* AUDIO */
audio{display:none}
</style>
</head>

<body>

<div class="brand-logo">NAJIFUL85</div>

<span class="status online">Server Online</span></a></li>

<li><a href="Updating/index.html" onclick="playClick()">⚙️ UPDATING
<span class="status maintenance">Maintenance</span></a></li>

</ul>
<div class="footer-text">SYSTEM SECURE</div>
</div>

<!-- INFO MODAL -->
<div id="infoModal" class="info-modal">
<div class="info-box">

<p>Yahan tum baad me info edit kar sakte ho</p>

</div>
</div>

<!-- SOCIAL FOOTER -->
<div class="social-footer">

<div class="light-button whatsapp">
<a href="https://wa.me/+919800409085" target="_blank">
<div class="button-holder">
<svg viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32..."/></svg>
</div></a>

</div>

<div class="light-button instagram">
<a href="https://www.instagram.com/with_chaman/" target="_blank">
<div class="button-holder">
<svg viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3..."/></svg>
</div></a>
<div class="light-holder"><div class="dot"></div><div class="light"></div></div>
</div>

</div>

<audio id="clickSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">

<script>

</script>

</body>
</html>
