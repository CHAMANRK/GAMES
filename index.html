    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #00f5ff;
            --secondary: #7f00ff;
            --bg-dark: #020205;
            --neon-green: #00d757;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #10102a 0%, #050505 100%);
            font-family: 'Rajdhani', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 200px; /* Space for footer social buttons */
        }

        /* HEADER */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
            letter-spacing: 2px;
        }

        /* MAIN CONTENT */
        .main-title {
            font-family: 'Bungee Shade', cursive;
            font-size: clamp(30px, 10vw, 60px);
            margin-top: 50px;
            text-shadow: 0 0 20px var(--primary);
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 30px;
            padding: 25px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(0, 245, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .menu-list { list-style: none; }
        .menu-list li { margin-bottom: 15px; }
        .menu-list a {
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            padding: 14px 18px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .menu-list a:hover {
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary);
        }

        /* SOCIAL BUTTONS SECTION (SABSE NICHE) */
        .social-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            padding-bottom: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            z-index: 100;
        }

        .light-button {
            position: relative;
            width: 80px;
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .button-holder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70px;
            width: 70px;
            background-color: #0a0a0a;
            border-radius: 12px;
            transition: 300ms;
            outline: #111 2px solid;
            outline-offset: 8px;
            z-index: 5;
        }

        .button-holder svg {
            height: 30px;
            fill: #444;
            transition: 300ms;
        }

        .light-holder {
            position: absolute;
            top: 0;
            height: 150px;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .dot {
            position: absolute;
            top: 0;
            width: 8px;
            height: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green);
            opacity: 0;
            transition: 300ms;
        }

        .light {
            position: absolute;
            top: 0;
            width: 100px;
            height: 120px;
            clip-path: polygon(50% 0%, 20% 100%, 80% 100%);
            background: linear-gradient(180deg, rgba(0, 215, 87, 0.5) 0%, rgba(0, 215, 87, 0) 80%);
            opacity: 0;
            transition: 300ms;
        }

        /* Hover Effects */
        .light-button:hover .button-holder {
            outline-color: var(--neon-green);
            outline-offset: 2px;
            background: #0f0f0f;
        }
        .light-button:hover svg { fill: var(--neon-green); }
        .light-button:hover .dot, .light-button:hover .light { opacity: 1; }

    </style>
</head>
