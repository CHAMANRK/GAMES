<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS | NAJEEF</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        :root {
            --glow: #00ff41; /* Classic Hacker Green */
            --bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--glow);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 0.4fr;
            gap: 15px;
            padding: 20px;
            text-transform: uppercase;
        }

        /* Scanline Effect */
        body::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            pointer-events: none;
            background-size: 100% 3px, 3px 100%;
        }

        .terminal-box {
            border: 1px solid var(--glow);
            padding: 15px;
            position: relative;
            overflow: hidden;
            background: rgba(0, 20, 0, 0.2);
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.2);
        }

        .terminal-box::before {
            content: attr(data-label);
            position: absolute;
            top: 0; right: 10px;
            background: var(--glow);
            color: #000;
            font-size: 10px;
            padding: 2px 5px;
            font-weight: bold;
        }

        #left-terminal { grid-area: 1 / 1 / 2 / 2; }
        #right-terminal { grid-area: 1 / 2 / 2 / 3; }
        #bottom-terminal { grid-area: 2 / 1 / 3 / 3; }

        .line {
            margin-bottom: 5px;
            font-size: 13px;
            display: block;
            text-shadow: 0 0 5px var(--glow);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--glow);
            animation: blink 0.6s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Progress Bar */
        .progress-container { margin-top: 10px; display: none; }
        .progress-bar {
            width: 0%;
            height: 15px;
            background: var(--glow);
            transition: width 0.1s;
        }

        /* Enter Button */
        #enter-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: var(--glow);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: none;
            z-index: 200;
            font-size: 20px;
            box-shadow: 0 0 30px var(--glow);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr 0.5fr; }
            #left-terminal, #right-terminal, #bottom-terminal { grid-area: auto; }
        }
    </style>
</head>
<body>

    <div class="terminal-box" id="left-terminal" data-label="SYSTEM_LOG">
        <div id="log-content"></div>
    </div>

    <div class="terminal-box" id="right-terminal" data-label="SECURITY_BYPASS">
        <div id="security-content"></div>
    </div>

    <div class="terminal-box" id="bottom-terminal" data-label="INITIALIZATION">
        <div id="init-content"></div>
        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
            <span id="p-text">0%</span>
        </div>
    </div>

    <button id="enter-btn" onclick="location.href='menu.html'">ENTER SYSTEM</button>

    <audio id="typeSound"><source src="https://www.soundjay.com/communication/typewriter-finger-tap-1.mp3" type="audio/mpeg"></audio>
    <audio id="accessSound"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg"></audio>

    <script>
        const typeSound = document.getElementById('typeSound');
        const accessSound = document.getElementById('accessSound');

        async function typeText(elementId, textArray, speed = 30) {
            const container = document.getElementById(elementId);
            for (let text of textArray) {
                let line = document.createElement('span');
                line.className = 'line';
                container.appendChild(line);
                
                for (let char of text) {
                    line.innerHTML += char;
                    typeSound.currentTime = 0;
                    typeSound.play().catch(()=>{}); // Handle browser audio block
                    await new Promise(r => setTimeout(r, speed));
                }
                container.scrollTop = container.scrollHeight;
            }
        }

        async function startLoading() {
            const container = document.getElementById('p-container');
            const bar = document.getElementById('p-bar');
            const text = document.getElementById('p-text');
            container.style.display = 'block';

            for (let i = 0; i <= 100; i++) {
                bar.style.width = i + '%';
                text.innerText = `BYPASSING ENCRYPTION... ${i}%`;
                await new Promise(r => setTimeout(r, 40)); // Speed of loading
            }
        }

        async function runSequence() {
            // Sequence 1: Left Terminal
            await typeText('log-content', [
                "> BOOTING NAJEEF OS V8.5...",
                "> CONNECTING TO SECURE SERVER...",
                "> IP: 192.168.1.105 FOUND",
                "> STATUS: UNKNOWN SOURCE",
                "> WARNING: UNAUTHORIZED ACCESS DETECTED!"
            ], 20);

            // Sequence 2: Right Terminal
            await typeText('security-content', [
                "> DECRYPTING RSA_KEYS...",
                "> BRUTE FORCING DATABASE...",
                "> BYPASSING FIREWALL...",
                "> ACCESS GRANTED TO CORE_FILES"
            ], 15);

            // Sequence 3: Bottom Terminal + Loading
            await typeText('init-content', ["> STARTING FINAL HANDSHAKE..."], 30);
            await startLoading();

            // Final Step
            accessSound.play();
            document.getElementById('enter-btn').style.display = 'block';
        }

        // Start when page loads
        window.onload = runSequence;
    </script>
</body>
</html>
