<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najeef Game World | Ultra Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #00f5ff;
            --secondary: #7f00ff;
            --bg-dark: #020205;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-dark);
            overflow-x: hidden;
            background: radial-gradient(circle at center, #10102a 0%, #050505 100%);
        }

        /* Scanline Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        /* BIG HEADING */
        .main-title {
            font-family: 'Bungee Shade', cursive;
            font-size: clamp(30px, 8vw, 55px);
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.1;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);
            animation: float 3s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        /* GLASS CONTAINER */
        .container {
            position: relative;
            z-index: 5;
            width: 90%;
            max-width: 380px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(0, 245, 255, 0.2);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .menu-list {
            list-style: none;
        }

        .menu-list li {
            margin-bottom: 15px;
        }

        .menu-list a {
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            padding: 16px 20px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .menu-list a span {
            margin-right: 15px;
            font-size: 20px;
            filter: drop-shadow(0 0 5px #fff);
        }

        /* HOVER EFFECTS */
        .menu-list a:hover {
            background: rgba(0, 245, 255, 0.1);
            border-color: var(--primary);
            transform: scale(1.05) translateX(5px);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
            color: var(--primary);
        }

        /* Glowing Dot for Active Feel */
        .menu-list a::before {
            content: '';
            position: absolute;
            left: 10px;
            width: 4px;
            height: 0;
            background: var(--primary);
            transition: 0.3s;
        }

        .menu-list a:hover::before {
            height: 60%;
        }

        .footer {
            margin-top: 25px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .footer b { color: var(--primary); }

    </style>
</head>
<body>

    <h1 class="main-title">NAJEEF<br>GAME WORLD</h1>

            <li><a href="Checking/Index.html"><span>🤖</span> AI Tester</a></li>
            <li><a href="Updating/index.html"><span>🛠️</span> Updating</a></li>
            <li><a href="Up/In.html"><span>☕</span> Cafe</a></li>
            <li><a href="HOTEL/In.html"><span>🏨</span> Hotel</a></li>
        </ul>

        <div class="footer">
            SYSTEM STATUS: <b>ONLINE</b><br>
            Powered by Najiful85.xyz
        </div>
    </div>

</body>
</html>
