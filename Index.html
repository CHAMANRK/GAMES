<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booting System...</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap');

:root{
  --cyan:#00f5ff;
  --yellow:#f5c542;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  background:#000;
  color:var(--cyan);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* HUD FRAME */
.hud{
  width:90%;
  max-width:360px;
  border:2px solid var(--cyan);
  padding:18px;
  box-shadow:0 0 40px var(--cyan);
}

/* HEADER */
.hud h3{
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:10px;
}

/* TERMINAL */
.terminal{
  border:1px solid var(--cyan);
  padding:12px;
  height:160px;
  font-size:12px;
  overflow:hidden;
}

/* ENTER BUTTON */
#enter{
  display:none;
  margin-top:18px;
  padding:12px;
  width:100%;
  background:var(--cyan);
  color:#000;
  border:none;
  cursor:pointer;
  font-size:13px;
  letter-spacing:2px;
  box-shadow:0 0 20px var(--cyan);
}
</style>
</head>

<body>

<div class="hud">
  <h3>GAME SYSTEM BOOT</h3>

  <div class="terminal" id="terminal"></div>

  <button id="enter">▶ ENTER GAME WORLD</button>
</div>

<!-- typing sound -->
<audio id="typeSound" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2569/2569-preview.mp3" type="audio/mpeg">
</audio>

<script>
/* SKIP INTRO AFTER FIRST TIME */
if(localStorage.getItem('introSeen')){
  location.href = "menu.html";
}

const lines = [
  "Initializing Game Engine...",
  "Loading Assets & Maps...",
  "Syncing Player Data...",
  "Anti-Cheat System Online ✔",
  "Welcome to NAJEEF GAME WORLD"
];

const terminal = document.getElementById("terminal");
const sound = document.getElementById("typeSound");
const enterBtn = document.getElementById("enter");

let lineIndex = 0;
let charIndex = 0;

function typeLine(){
  if(lineIndex >= lines.length){
    setTimeout(()=> enterBtn.style.display="block", 500);
    return;
  }

  if(charIndex < lines[lineIndex].length){
    terminal.innerHTML += lines[lineIndex][charIndex];
    sound.currentTime = 0;
    sound.play();
    charIndex++;
    setTimeout(typeLine, 35); // typing speed
  }else{
    terminal.innerHTML += "<br>";
    charIndex = 0;
    lineIndex++;
    setTimeout(typeLine, 200);
  }
}

typeLine();

/* ENTER BUTTON */
enterBtn.onclick = ()=>{
  localStorage.setItem('introSeen','yes');
  location.href = "menu.html";
};
</script>

</body>
</html>
