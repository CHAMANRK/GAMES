<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TIMEX">
<link rel="manifest" href="manifest.json">
<title>TIMEX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --tc:#00f5c4;
  --bg:#000000;
  --surf:#0f0f0f;
  --bdr:rgba(255,255,255,0.09);
  --txt:#f0f0f8;
  --mut:rgba(240,240,248,0.35);
  --red:#ff3a6e;
  --pur:#8b6fff;
}
html{height:100%;-webkit-tap-highlight-color:transparent;}
body{
  height:100%;min-height:100dvh;
  background:var(--bg);color:var(--txt);
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
}

/* ── SHELL ── */
#app{
  position:relative;z-index:1;
  height:100dvh;display:flex;flex-direction:column;
}

/* ── NAV ── */
#nav{
  display:flex;align-items:center;gap:3px;
  padding:max(env(safe-area-inset-top,0px),10px) 12px 8px;
  background:rgba(0,0,0,0.93);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
  position:relative;z-index:50;
}
#nav::-webkit-scrollbar{display:none;}

.logo{
  font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:4px;
  color:var(--tc);margin-right:8px;flex-shrink:0;
  text-shadow:0 0 16px var(--tc);transition:color .4s,text-shadow .4s;
}
.tab{
  padding:5px 13px;border-radius:7px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;border:1px solid transparent;background:transparent;
  color:var(--mut);transition:all .15s;flex-shrink:0;white-space:nowrap;
}
.tab:active{opacity:.7;}
.tab.on{background:rgba(var(--tc-rgb),0.12);border-color:rgba(var(--tc-rgb),0.35);color:var(--tc);}

.nav-end{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}

/* color dot */
#cbtn{
  width:30px;height:30px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);cursor:pointer;
  background:var(--tc);transition:background .3s;
  position:relative;overflow:hidden;flex-shrink:0;
}
#cbtn input[type=color]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0;
}

/* fs btn */
#fsbtn{
  width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,0.05);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--mut);
  transition:all .2s;flex-shrink:0;
}
#fsbtn:active{transform:scale(.9);}

/* ── COLOUR PANEL ── */
#cpanel{
  display:none;position:fixed;
  top:52px;right:10px;z-index:200;
  background:rgba(8,8,8,0.97);
  border:1px solid var(--bdr);border-radius:14px;
  padding:14px 16px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  min-width:230px;
  animation:panelIn .18s ease;
}
#cpanel.show{display:block;}
@keyframes panelIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.cp-ttl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);margin-bottom:10px;}
.cp-swatches{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.sw:active{transform:scale(.88);}
.sw.sel{border-color:#fff;transform:scale(1.18);}
.cp-cust-row{display:flex;align-items:center;gap:10px;}
.cp-cust-lbl{font-size:10px;color:var(--mut);letter-spacing:1px;flex:1;}
#cp-cust{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--bdr);cursor:pointer;
  overflow:hidden;position:relative;background:var(--tc);
}
#cp-cust input{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:200%;height:200%;}

/* ── VIEWS ── */
.view{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;position:relative;}
.view.on{display:flex;}

/* ── TOUCH OVERLAY (anywhere pause/play) ── */
.tov{
  position:absolute;inset:0;z-index:30;
  display:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.htp .tov{display:block;}

/* ripple */
.rpl{
  position:absolute;border-radius:50%;pointer-events:none;
  width:70px;height:70px;margin:-35px 0 0 -35px;
  animation:rplA .45s ease-out forwards;
}
@keyframes rplA{0%{transform:scale(0);opacity:1}100%{transform:scale(5);opacity:0}}

/* cinema */
body.cinema #nav{display:none;}
body.cinema .clock-time{font-size:clamp(130px,30vw,340px)!important;}
body.cinema .clock-secs{font-size:clamp(52px,11vw,130px)!important;}
body.cinema .world-strip{display:none!important;}
body.cinema .sw-time{font-size:clamp(110px,24vw,280px)!important;}
body.cinema .cd-num{font-size:clamp(80px,18vw,200px)!important;}
body.cinema .tmr-svg{width:min(78vw,78vh)!important;height:min(78vw,78vh)!important;}
body.cinema .tmr-disp{font-size:clamp(44px,11vw,120px)!important;}

#cmhint{
  display:none;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);border:1px solid var(--bdr);
  padding:6px 16px;border-radius:20px;
  font-size:10px;color:var(--mut);letter-spacing:2px;
  z-index:999;pointer-events:none;
  animation:fadeHint 1s 2.5s forwards;
}
body.cinema #cmhint{display:block;}
@keyframes fadeHint{to{opacity:0;}}

/* ════════════ 1. CLOCK ════════════ */
#vw-clock{align-items:center;justify-content:space-between;padding:14px 16px 10px;gap:8px;}
.clk-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px;}
.clk-date{font-family:'Space Mono',monospace;font-size:clamp(10px,2.2vw,13px);letter-spacing:3px;color:var(--mut);text-transform:uppercase;}
.clock-time{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(76px,22vw,220px);line-height:.86;
  color:var(--tc);text-shadow:0 0 50px color-mix(in srgb,var(--tc) 40%,transparent);
  transition:color .4s,text-shadow .4s;
}
.clock-secs{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(28px,7vw,72px);
  color:var(--tc);opacity:.6;letter-spacing:5px;transition:color .4s;
}
.clk-ampm{font-family:'Space Mono',monospace;font-size:clamp(10px,2.2vw,15px);color:var(--mut);letter-spacing:5px;margin-top:4px;}
.clk-tz{font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:1.5px;margin-top:1px;}

.world-strip{display:flex;gap:7px;width:100%;justify-content:center;flex-wrap:wrap;flex-shrink:0;}
.wc{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:7px 12px;text-align:center;min-width:80px;transition:border-color .2s;}
.wc:active{border-color:var(--tc);}
.wc-city{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:2px;}
.wc-time{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--tc);letter-spacing:2px;transition:color .4s;}
.wc-tz{font-size:9px;color:var(--mut);font-family:'Space Mono',monospace;}

/* ════════════ 2. STOPWATCH ════════════ */
#vw-sw{align-items:center;justify-content:space-between;padding:14px 16px;gap:8px;}
.sw-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sw-time{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(64px,19vw,200px);line-height:1;letter-spacing:4px;
  color:var(--tc);transition:color .4s,opacity .3s;
  text-shadow:0 0 40px color-mix(in srgb,var(--tc) 30%,transparent);
}
.sw-time.paused{opacity:.45;}
.sw-ms{font-family:'Space Mono',monospace;font-size:clamp(18px,5vw,46px);color:var(--mut);letter-spacing:4px;margin-top:-4px;}

.sw-ctrl{display:flex;gap:12px;align-items:center;flex-shrink:0;}
.sw-laps{width:100%;max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;flex-shrink:0;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;}
.lap-row{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:var(--surf);border:1px solid var(--bdr);border-radius:8px;font-family:'Space Mono',monospace;font-size:11px;animation:sldIn .2s ease;}
@keyframes sldIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.lap-n{color:var(--mut);font-size:10px;}
.lap-t{color:var(--txt);}
.lap-sp{color:var(--mut);font-size:10px;}
.lap-row.best .lap-t{color:var(--tc);}
.lap-row.worst .lap-t{color:var(--red);}

/* ════════════ 3. TIMER ════════════ */
#vw-tmr{align-items:center;justify-content:space-between;padding:10px 16px 14px;gap:8px;}
.tmr-ring-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;}
.tmr-svg{width:min(54vw,44vh);height:min(54vw,44vh);transition:all .3s;}
.tr-track{fill:none;stroke:#111;stroke-width:7;}
.tr-fill{fill:none;stroke:var(--tc);stroke-width:7;stroke-linecap:round;stroke-dasharray:741.42;stroke-dashoffset:0;transition:stroke-dashoffset .95s linear,stroke .4s;}
.tr-fill.urg{stroke:var(--red);}
.tmr-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.tmr-disp{font-family:'Bebas Neue',cursive;font-size:clamp(34px,9vw,96px);line-height:1;letter-spacing:3px;color:var(--tc);transition:color .4s;}
.tmr-disp.urg{color:var(--red)!important;text-shadow:0 0 22px rgba(255,58,110,.5);}
.tmr-sub{font-size:10px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;margin-top:2px;}

.tmr-inputs{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.t-grp{display:flex;flex-direction:column;align-items:center;gap:3px;}
.t-lbl{font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;}
.t-inp{width:clamp(50px,13vw,70px);height:clamp(40px,8vw,54px);background:var(--surf);border:1px solid var(--bdr);border-radius:10px;text-align:center;font-family:'Bebas Neue',cursive;font-size:clamp(22px,5vw,34px);color:var(--tc);letter-spacing:2px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s;}
.t-inp:focus{border-color:var(--tc);}
.t-sep{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--mut);margin-top:10px;}

.presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;flex-shrink:0;}
.pre{padding:4px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--surf);color:var(--mut);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;}
.pre:active{border-color:var(--tc);color:var(--tc);}

.tmr-ctrl{display:flex;gap:12px;align-items:center;flex-shrink:0;}

/* ════════════ 4. COUNTDOWN ════════════ */
#vw-cd{align-items:center;justify-content:space-between;padding:14px 16px;gap:8px;}
.cd-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.cd-for{font-size:10px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;}
.cd-evname{font-family:'Bebas Neue',cursive;font-size:clamp(20px,5vw,40px);color:var(--tc);letter-spacing:4px;text-align:center;transition:color .4s;}
.cd-row{display:flex;gap:clamp(6px,2vw,24px);align-items:flex-end;}
.cd-unit{display:flex;flex-direction:column;align-items:center;gap:2px;}
.cd-num{font-family:'Bebas Neue',cursive;font-size:clamp(40px,12vw,120px);line-height:1;color:var(--tc);min-width:2ch;text-align:center;transition:color .4s;}
.cd-num.tick{animation:numPop .22s ease;}
@keyframes numPop{0%{transform:scale(1.12);opacity:.5}100%{transform:none;opacity:1}}
.cd-ulbl{font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;}
.cd-dot{font-family:'Bebas Neue',cursive;font-size:clamp(28px,6vw,60px);color:var(--mut);margin-bottom:14px;opacity:.3;}

.cd-bar{width:100%;height:2px;background:var(--surf);border-radius:2px;overflow:hidden;flex-shrink:0;}
.cd-prog{height:100%;background:var(--tc);border-radius:2px;transition:width 1s linear,background .4s;}

.cd-form{width:100%;max-width:420px;align-self:center;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.cd-form-row{display:flex;gap:8px;align-items:center;}
.fi{flex:1;height:40px;background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:0 14px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;color:var(--txt);outline:none;color-scheme:dark;transition:border-color .2s;}
.fi:focus{border-color:var(--tc);}

/* ════════════ 5. ALARM ════════════ */
#vw-al{padding:14px 16px;gap:12px;overflow-y:auto;}
.al-hdr{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.al-title{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:4px;color:var(--tc);transition:color .4s;}
.al-add{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.al-ti{height:44px;background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:0 14px;font-family:'Bebas Neue',cursive;font-size:26px;color:var(--tc);outline:none;color-scheme:dark;letter-spacing:2px;transition:border-color .2s;}
.al-ti:focus{border-color:var(--tc);}
.al-li{flex:1;height:40px;background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:0 14px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;color:var(--txt);outline:none;min-width:80px;transition:border-color .2s;}
.al-li:focus{border-color:var(--tc);}

.al-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;}
.al-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;animation:sldIn .2s ease;transition:border-color .2s;}
.al-card.on{border-color:rgba(var(--tc-rgb),0.3);}
.al-card-t{font-family:'Bebas Neue',cursive;font-size:34px;color:var(--tc);letter-spacing:2px;flex:1;transition:color .4s;}
.al-card-l{font-size:11px;color:var(--mut);letter-spacing:1px;}
.al-card-cd{font-family:'Space Mono',monospace;font-size:10px;color:var(--tc);transition:color .4s;}
.al-del{background:none;border:none;color:var(--mut);cursor:pointer;font-size:15px;padding:4px;transition:color .2s;}
.al-del:active{color:var(--red);}

/* toggle */
.tog{position:relative;width:40px;height:22px;flex-shrink:0;cursor:pointer;}
.tog input{opacity:0;width:0;height:0;}
.tog-sl{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:22px;transition:.3s;}
.tog-sl::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:var(--mut);border-radius:50%;transition:.3s;}
.tog input:checked+.tog-sl{background:rgba(var(--tc-rgb),.3);}
.tog input:checked+.tog-sl::before{transform:translateX(18px);background:var(--tc);}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--mut);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
.empty-ic{font-size:34px;opacity:.2;}

/* ════════════ BUTTONS ════════════ */
.btn{display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid var(--bdr);background:var(--surf);cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);transition:all .15s;-webkit-tap-highlight-color:transparent;width:56px;height:56px;flex-shrink:0;}
.btn:active{transform:scale(.91);}
.btn.primary{width:68px;height:68px;font-size:13px;border-color:var(--tc);color:var(--tc);box-shadow:0 0 16px rgba(var(--tc-rgb),.2);transition:all .15s,border-color .4s,color .4s,box-shadow .4s;}
.btn.primary:active{background:rgba(var(--tc-rgb),.12);}
.btn.danger{border-color:var(--red);color:var(--red);}
.btn.danger:active{background:rgba(255,58,110,.1);}
.btnr{padding:9px 20px;border-radius:9px;background:rgba(var(--tc-rgb),.1);border:1px solid rgba(var(--tc-rgb),.3);color:var(--tc);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s,background .4s,border-color .4s,color .4s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.btnr:active{transform:scale(.95);}

/* ════════════ OVERLAYS ════════════ */
.ovl{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.95);flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.ovl.show{display:flex;}
.ring-ic{font-size:68px;animation:ringShk .5s infinite;}
@keyframes ringShk{0%,100%{transform:rotate(-14deg)}50%{transform:rotate(14deg)}}
.ring-time{font-family:'Bebas Neue',cursive;font-size:68px;color:var(--tc);transition:color .4s;}
.ring-lbl{font-family:'Bebas Neue',cursive;font-size:40px;letter-spacing:5px;color:var(--txt);}
.done-pulse{width:110px;height:110px;border-radius:50%;background:rgba(var(--tc-rgb),.1);border:2px solid var(--tc);display:flex;align-items:center;justify-content:center;font-size:44px;animation:pls 1.2s infinite;transition:border-color .4s,background .4s;}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(var(--tc-rgb),.4)}50%{box-shadow:0 0 0 26px rgba(var(--tc-rgb),0)}}
.done-txt{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:6px;}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}

@media(max-width:370px){
  .tab{padding:4px 9px;font-size:10px;}
  .btn.primary{width:62px;height:62px;}
  .btn{width:50px;height:50px;}
}
</style>
</head>
<body>
<div id="app">

<!-- NAV -->
<div id="nav">
  <div class="logo">TIMEX</div>
  <button class="tab on"  data-tab="clock">🕐 Clock</button>
  <button class="tab"     data-tab="sw">⏱ Stop</button>
  <button class="tab"     data-tab="tmr">⏲ Timer</button>
  <button class="tab"     data-tab="cd">📅 Cdwn</button>
  <button class="tab"     data-tab="al">🔔 Alarm</button>
  <div class="nav-end">
    <div id="cbtn" title="Time color">
      <input type="color" id="inline-color" value="#00f5c4">
    </div>
    <div id="fsbtn" title="Cinema mode">⛶</div>
  </div>
</div>

<!-- COLOUR PANEL -->
<div id="cpanel">
  <div class="cp-ttl">Time Color</div>
  <div class="cp-swatches" id="cp-sw"></div>
  <div class="cp-cust-row">
    <span class="cp-cust-lbl">Custom</span>
    <div id="cp-cust"><input type="color" id="cp-cust-inp" value="#00f5c4"></div>
  </div>
</div>

<!-- ══ 1. CLOCK ══ -->
<div class="view on" id="vw-clock">
  <div class="clk-main">
    <div class="clk-date" id="cl-date"></div>
    <div class="clock-time" id="cl-hm"></div>
    <div class="clock-secs" id="cl-s"></div>
    <div class="clk-ampm" id="cl-ap"></div>
    <div class="clk-tz" id="cl-tz"></div>
  </div>
  <div class="world-strip" id="wstrip"></div>
</div>

<!-- ══ 2. STOPWATCH ══ -->
<div class="view htp" id="vw-sw">
  <div class="tov" id="tov-sw"></div>
  <div class="sw-main">
    <div class="sw-time" id="sw-t">00:00</div>
    <div class="sw-ms"  id="sw-ms">.000</div>
  </div>
  <div class="sw-ctrl">
    <button class="btn" id="sw-lap" onclick="swLap()" disabled>LAP</button>
    <button class="btn primary" id="sw-btn" onclick="swToggle()">START</button>
    <button class="btn danger"  onclick="swReset()">RESET</button>
  </div>
  <div class="sw-laps" id="sw-laps"></div>
</div>

<!-- ══ 3. TIMER ══ -->
<div class="view htp" id="vw-tmr">
  <div class="tov" id="tov-tmr"></div>
  <div class="tmr-ring-wrap">
    <svg class="tmr-svg" viewBox="0 0 260 260">
      <circle class="tr-track" cx="130" cy="130" r="118"/>
      <circle class="tr-fill"  cx="130" cy="130" r="118" id="tr-fill" style="transform:rotate(-90deg);transform-origin:50% 50%;"/>
    </svg>
    <div class="tmr-center">
      <div class="tmr-disp" id="tmr-d">00:00:00</div>
      <div class="tmr-sub"  id="tmr-sub">SET TIMER</div>
    </div>
  </div>
  <div class="tmr-inputs" id="tmr-inps">
    <div class="t-grp"><input class="t-inp" id="t-h" type="number" min="0" max="99"  value="0"><div class="t-lbl">HH</div></div>
    <div class="t-sep">:</div>
    <div class="t-grp"><input class="t-inp" id="t-m" type="number" min="0" max="59"  value="5"><div class="t-lbl">MM</div></div>
    <div class="t-sep">:</div>
    <div class="t-grp"><input class="t-inp" id="t-s" type="number" min="0" max="59"  value="0"><div class="t-lbl">SS</div></div>
  </div>
  <div class="presets">
    <button class="pre" onclick="setP(1)">1m</button>
    <button class="pre" onclick="setP(3)">3m</button>
    <button class="pre" onclick="setP(5)">5m</button>
    <button class="pre" onclick="setP(10)">10m</button>
    <button class="pre" onclick="setP(15)">15m</button>
    <button class="pre" onclick="setP(25)">25m</button>
    <button class="pre" onclick="setP(30)">30m</button>
    <button class="pre" onclick="setP(60)">1h</button>
  </div>
  <div class="tmr-ctrl">
    <button class="btn"         onclick="tmrReset()">RESET</button>
    <button class="btn primary" id="tmr-btn" onclick="tmrToggle()">START</button>
  </div>
</div>

<!-- ══ 4. COUNTDOWN ══ -->
<div class="view htp" id="vw-cd">
  <div class="tov" id="tov-cd"></div>
  <div class="cd-top">
    <div class="cd-for">Counting down to</div>
    <div class="cd-evname" id="cd-ev">—</div>
    <div class="cd-row">
      <div class="cd-unit"><div class="cd-num" id="cd-d">00</div><div class="cd-ulbl">Days</div></div>
      <div class="cd-dot">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">00</div><div class="cd-ulbl">Hrs</div></div>
      <div class="cd-dot">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">00</div><div class="cd-ulbl">Min</div></div>
      <div class="cd-dot">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">00</div><div class="cd-ulbl">Sec</div></div>
    </div>
  </div>
  <div class="cd-bar"><div class="cd-prog" id="cd-prog" style="width:0%"></div></div>
  <div class="cd-form">
    <div class="cd-form-row"><input class="fi" id="cd-name" type="text" placeholder="Event name"></div>
    <div class="cd-form-row">
      <input class="fi" id="cd-dt" type="datetime-local">
      <button class="btnr" onclick="cdSet()">SET</button>
    </div>
  </div>
</div>

<!-- ══ 5. ALARM ══ -->
<div class="view" id="vw-al">
  <div class="al-hdr"><div class="al-title">ALARMS</div></div>
  <div class="al-add">
    <input class="al-ti" id="al-time" type="time">
    <input class="al-li" id="al-lbl"  type="text" placeholder="Label">
    <button class="btnr" onclick="addAlarm()">ADD</button>
  </div>
  <div class="al-list" id="al-list">
    <div class="empty" id="al-empty"><div class="empty-ic">🔔</div><div>No alarms set</div></div>
  </div>
</div>

</div><!-- /app -->

<div id="cmhint">TAP ANYWHERE · PAUSE / PLAY</div>

<!-- Alarm overlay -->
<div class="ovl" id="ring-ovl">
  <div class="ring-ic">🔔</div>
  <div class="ring-time" id="ring-time"></div>
  <div class="ring-lbl"  id="ring-lbl">ALARM</div>
  <button class="btnr" onclick="dismissRing()">DISMISS</button>
</div>

<!-- Timer done overlay -->
<div class="ovl" id="done-ovl">
  <div class="done-pulse">✓</div>
  <div class="done-txt">TIME'S UP!</div>
  <button class="btnr" onclick="dismissDone()">OK</button>
</div>

<script>
'use strict';

/* ─── COLOR ─── */
const SWATCHES=['#00f5c4','#00cfff','#ffffff','#ff3a6e','#ff9f1c','#ffe94d','#8b6fff','#39ff14','#ff6ec7','#a0ff6f','#ff4500','#00aaff'];

let curColor='#00f5c4';

function h2rgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].join(',');}

function applyColor(hex){
  curColor=hex;
  const root=document.documentElement;
  root.style.setProperty('--tc',hex);
  root.style.setProperty('--tc-rgb',h2rgb(hex));
  document.getElementById('cbtn').style.background=hex;
  document.getElementById('cp-cust').style.background=hex;
  document.getElementById('cp-cust-inp').value=hex;
  document.getElementById('inline-color').value=hex;
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('sel',s.dataset.c===hex));
  try{localStorage.setItem('tx-color',hex);}catch(e){}
}

function buildSwatches(){
  const wrap=document.getElementById('cp-sw');
  SWATCHES.forEach(c=>{
    const d=document.createElement('div');
    d.className='sw';d.style.background=c;d.dataset.c=c;
    d.addEventListener('pointerdown',e=>{e.stopPropagation();applyColor(c);});
    wrap.appendChild(d);
  });
}

document.getElementById('inline-color').addEventListener('input',e=>applyColor(e.target.value));
document.getElementById('cp-cust-inp').addEventListener('input',e=>applyColor(e.target.value));
document.getElementById('cbtn').addEventListener('click',e=>{
  if(e.target.tagName==='INPUT') return;
  document.getElementById('cpanel').classList.toggle('show');
});
document.addEventListener('pointerdown',e=>{
  const p=document.getElementById('cpanel');
  if(p.classList.contains('show')&&!p.contains(e.target)&&!document.getElementById('cbtn').contains(e.target))
    p.classList.remove('show');
});

buildSwatches();
const sc=localStorage.getItem('tx-color');
applyColor(sc||'#00f5c4');

/* ─── TABS ─── */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
    this.classList.add('on');
    document.getElementById('vw-'+this.dataset.tab).classList.add('on');
    document.getElementById('cpanel').classList.remove('show');
  });
});

/* ─── CINEMA / FULLSCREEN ─── */
let cinema=false;
document.getElementById('fsbtn').addEventListener('click',()=>{
  cinema=!cinema;
  document.body.classList.toggle('cinema',cinema);
  document.getElementById('fsbtn').textContent=cinema?'✕':'⛶';
  if(cinema){
    const el=document.documentElement;
    try{(el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||function(){}).call(el);}catch(e){}
  } else {
    try{(document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||function(){}).call(document);}catch(e){}
  }
});
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement&&cinema){cinema=false;document.body.classList.remove('cinema');document.getElementById('fsbtn').textContent='⛶';}
});

/* ─── TOUCH OVERLAYS (anywhere pause/play) ─── */
function ripple(e,parent){
  const r=document.createElement('div');r.className='rpl';
  const rect=parent.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  r.style.left=cx+'px';r.style.top=cy+'px';
  r.style.background=`rgba(${h2rgb(curColor)},0.14)`;
  parent.appendChild(r);
  r.addEventListener('animationend',()=>r.remove());
}

document.getElementById('tov-sw').addEventListener('pointerdown',e=>{
  ripple(e,document.getElementById('vw-sw'));swToggle();
});
document.getElementById('tov-tmr').addEventListener('pointerdown',e=>{
  ripple(e,document.getElementById('vw-tmr'));tmrToggle();
});
document.getElementById('tov-cd').addEventListener('pointerdown',e=>{
  ripple(e,document.getElementById('vw-cd'));cdToggle();
});

/* ─── HELPERS ─── */
const pad=n=>String(n).padStart(2,'0');
function fmtMs(ms){
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  return h>0?`${pad(h)}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;
}

/* ─── 1. CLOCK ─── */
const WORLD=[
  {s:'NYC',tz:'America/New_York'},
  {s:'LON',tz:'Europe/London'},
  {s:'DXB',tz:'Asia/Dubai'},
  {s:'MUM',tz:'Asia/Kolkata'},
  {s:'TKY',tz:'Asia/Tokyo'},
  {s:'SYD',tz:'Australia/Sydney'},
];
(()=>{
  const ws=document.getElementById('wstrip');
  WORLD.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='wc';
    d.innerHTML=`<div class="wc-city">${c.s}</div><div class="wc-time" id="wt${i}">--:--</div><div class="wc-tz" id="wz${i}"></div>`;
    ws.appendChild(d);
  });
})();

function tickClock(){
  const n=new Date();
  const D=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('cl-date').textContent=`${D[n.getDay()]} · ${n.getDate()} ${M[n.getMonth()]} ${n.getFullYear()}`;
  const h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  const ap=h>=12?'PM':'AM',h12=h%12||12;
  document.getElementById('cl-hm').textContent=`${pad(h12)}:${pad(m)}`;
  document.getElementById('cl-s').textContent=pad(s);
  document.getElementById('cl-ap').textContent=ap;
  document.getElementById('cl-tz').textContent=Intl.DateTimeFormat().resolvedOptions().timeZone;
  WORLD.forEach((c,i)=>{
    document.getElementById('wt'+i).textContent=new Date().toLocaleTimeString('en-US',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',hour12:false});
    document.getElementById('wz'+i).textContent=new Date().toLocaleTimeString('en-US',{timeZone:c.tz,timeZoneName:'short'}).split(' ').pop();
  });
}
setInterval(tickClock,1000);tickClock();

/* ─── 2. STOPWATCH ─── */
let swRun=false,swEl=0,swSt=0,swIv=null,swLpSt=0,swLaps=[];
function swRender(){
  const ms=swRun?swEl+Date.now()-swSt:swEl;
  document.getElementById('sw-t').textContent=fmtMs(ms);
  document.getElementById('sw-ms').textContent='.'+String(ms%1000).padStart(3,'0');
}
function swToggle(){
  const t=document.getElementById('sw-t');
  if(!swRun){
    swSt=Date.now();if(!swLpSt)swLpSt=Date.now();
    swRun=true;swIv=setInterval(swRender,30);
    t.classList.remove('paused');
    document.getElementById('sw-btn').textContent='PAUSE';
    document.getElementById('sw-lap').disabled=false;
  } else {
    swEl+=Date.now()-swSt;clearInterval(swIv);swRun=false;
    t.classList.add('paused');
    document.getElementById('sw-btn').textContent='RESUME';
  }
}
function swReset(){
  clearInterval(swIv);swRun=false;swEl=0;swSt=0;swLpSt=0;swLaps=[];
  document.getElementById('sw-t').textContent='00:00';
  document.getElementById('sw-ms').textContent='.000';
  document.getElementById('sw-t').classList.remove('paused');
  document.getElementById('sw-btn').textContent='START';
  document.getElementById('sw-lap').disabled=true;
  document.getElementById('sw-laps').innerHTML='';
}
function swLap(){
  if(!swRun)return;
  const now=Date.now();
  const total=swEl+now-swSt,split=swLpSt?now-swLpSt:total;
  swLaps.push({total,split,num:swLaps.length+1});swLpSt=now;
  const sps=swLaps.map(l=>l.split);
  const best=Math.min(...sps),worst=Math.max(...sps);
  const c=document.getElementById('sw-laps');c.innerHTML='';
  [...swLaps].reverse().forEach(l=>{
    const d=document.createElement('div');
    d.className='lap-row'+(l.split===best&&swLaps.length>1?' best':'')+(l.split===worst&&swLaps.length>1?' worst':'');
    d.innerHTML=`<span class="lap-n">LAP ${pad(l.num)}</span><span class="lap-t">${fmtMs(l.total)}</span><span class="lap-sp">+${fmtMs(l.split)}</span>`;
    c.appendChild(d);
  });
}

/* ─── 3. TIMER ─── */
const CIRC=741.42;
let tmrTotal=0,tmrRem=0,tmrRun=false,tmrIv=null,tmrEnd=0;
function setP(m){document.getElementById('t-h').value=0;document.getElementById('t-m').value=m;document.getElementById('t-s').value=0;}
function tmrToggle(){
  if(!tmrRun){
    if(!tmrRem){
      const h=+document.getElementById('t-h').value||0;
      const m=+document.getElementById('t-m').value||0;
      const s=+document.getElementById('t-s').value||0;
      tmrTotal=(h*3600+m*60+s)*1000;if(!tmrTotal)return;tmrRem=tmrTotal;
    }
    tmrEnd=Date.now()+tmrRem;tmrRun=true;
    document.getElementById('tmr-btn').textContent='PAUSE';
    document.getElementById('tmr-inps').style.opacity='.3';
    document.getElementById('tmr-inps').style.pointerEvents='none';
    document.getElementById('tmr-sub').textContent='RUNNING';
    tmrIv=setInterval(tmrTick,120);tmrTick();
  } else {
    tmrRem=tmrEnd-Date.now();clearInterval(tmrIv);tmrRun=false;
    document.getElementById('tmr-btn').textContent='RESUME';
    document.getElementById('tmr-sub').textContent='PAUSED';
  }
}
function tmrTick(){
  const rem=tmrEnd-Date.now();
  if(rem<=0){
    clearInterval(tmrIv);tmrRun=false;tmrRem=0;renderRing(0);
    document.getElementById('done-ovl').classList.add('show');
    try{if(navigator.vibrate)navigator.vibrate([300,150,300,150,600]);}catch(e){}
    return;
  }
  renderRing(rem);
}
function renderRing(rem){
  const h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000),s=Math.floor((rem%60000)/1000);
  document.getElementById('tmr-d').textContent=`${pad(h)}:${pad(m)}:${pad(s)}`;
  const pct=tmrTotal>0?rem/tmrTotal:0;
  document.getElementById('tr-fill').style.strokeDashoffset=CIRC*(1-pct);
  const urg=rem<10000;
  document.getElementById('tr-fill').classList.toggle('urg',urg);
  document.getElementById('tmr-d').classList.toggle('urg',urg);
}
function tmrReset(){
  clearInterval(tmrIv);tmrRun=false;tmrRem=0;tmrTotal=0;
  document.getElementById('tmr-d').textContent='00:00:00';
  document.getElementById('tmr-d').classList.remove('urg');
  document.getElementById('tr-fill').style.strokeDashoffset=0;
  document.getElementById('tr-fill').classList.remove('urg');
  document.getElementById('tmr-btn').textContent='START';
  document.getElementById('tmr-inps').style.opacity='1';
  document.getElementById('tmr-inps').style.pointerEvents='';
  document.getElementById('tmr-sub').textContent='SET TIMER';
}
function dismissDone(){document.getElementById('done-ovl').classList.remove('show');tmrReset();}

/* ─── 4. COUNTDOWN ─── */
let cdTarget=null,cdStartMs=null,cdIv=null,cdPaused=false,cdRemPause=0;
function cdSet(){
  const name=document.getElementById('cd-name').value.trim()||'Event';
  const dt=document.getElementById('cd-dt').value;
  if(!dt){alert('Pick a date & time!');return;}
  cdTarget=new Date(dt).getTime();cdStartMs=Date.now();cdPaused=false;
  document.getElementById('cd-ev').textContent=name;
  clearInterval(cdIv);cdIv=setInterval(cdTick,1000);cdTick();
}
function cdToggle(){
  if(!cdTarget)return;
  if(!cdPaused){
    cdPaused=true;cdRemPause=cdTarget-Date.now();clearInterval(cdIv);
  } else {
    cdPaused=false;cdTarget=Date.now()+cdRemPause;
    cdIv=setInterval(cdTick,1000);cdTick();
  }
}
function cdTick(){
  if(!cdTarget)return;
  const now=Date.now();let diff=cdTarget-now;if(diff<0)diff=0;
  setCD('cd-d',Math.floor(diff/86400000));
  setCD('cd-h',pad(Math.floor((diff%86400000)/3600000)));
  setCD('cd-m',pad(Math.floor((diff%3600000)/60000)));
  setCD('cd-s',pad(Math.floor((diff%60000)/1000)));
  if(cdStartMs){
    const tot=cdTarget-cdStartMs,el2=now-cdStartMs;
    document.getElementById('cd-prog').style.width=Math.max(0,Math.min(100,(el2/tot)*100))+'%';
  }
}
function setCD(id,val){
  const el=document.getElementById(id);
  if(el.textContent!==String(val)){el.classList.remove('tick');void el.offsetWidth;el.classList.add('tick');el.textContent=val;}
}

/* ─── 5. ALARM ─── */
let alarms=[],ringId=null;
const df=new Date();df.setHours(df.getHours()+1,0,0,0);
document.getElementById('al-time').value=`${pad(df.getHours())}:${pad(df.getMinutes())}`;

function addAlarm(){
  const t=document.getElementById('al-time').value;if(!t)return;
  const lbl=document.getElementById('al-lbl').value.trim()||'Alarm';
  alarms.push({id:Date.now(),time:t,label:lbl,on:true});
  document.getElementById('al-lbl').value='';renderAlarms();
}
function renderAlarms(){
  const list=document.getElementById('al-list');
  const emp=document.getElementById('al-empty');
  if(!alarms.length){list.innerHTML='';list.appendChild(emp);return;}
  list.innerHTML='';
  alarms.forEach(a=>{
    const d=document.createElement('div');
    d.className='al-card'+(a.on?' on':'');d.id='ac'+a.id;
    d.innerHTML=`<div style="flex:1"><div class="al-card-t">${a.time}</div><div class="al-card-l">${a.label}</div><div class="al-card-cd" id="acd${a.id}"></div></div>
    <label class="tog"><input type="checkbox" ${a.on?'checked':''} onchange="togAl(${a.id})"><span class="tog-sl"></span></label>
    <button class="al-del" onclick="delAl(${a.id})">✕</button>`;
    list.appendChild(d);
  });
}
function togAl(id){const a=alarms.find(x=>x.id===id);if(a)a.on=!a.on;renderAlarms();}
function delAl(id){alarms=alarms.filter(x=>x.id!==id);renderAlarms();}
function checkAlarms(){
  const now=new Date();
  const hhmm=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  alarms.forEach(a=>{
    const el=document.getElementById('acd'+a.id);
    if(el){
      const[ah,am]=a.time.split(':').map(Number);
      let d=(ah*60+am)-(now.getHours()*60+now.getMinutes());
      if(d<0)d+=1440;
      el.textContent=d===0?'NOW':`in ${Math.floor(d/60)>0?Math.floor(d/60)+'h ':''}${d%60}m`;
    }
    if(a.on&&a.time===hhmm&&now.getSeconds()===0&&ringId!==a.id){
      ringId=a.id;
      document.getElementById('ring-time').textContent=a.time;
      document.getElementById('ring-lbl').textContent=a.label;
      document.getElementById('ring-ovl').classList.add('show');
      try{if(navigator.vibrate)navigator.vibrate([500,200,500,200,500,200,500]);}catch(e){}
    }
  });
}
function dismissRing(){document.getElementById('ring-ovl').classList.remove('show');ringId=null;}
setInterval(checkAlarms,1000);renderAlarms();

/* ─── WAKE LOCK ─── */
async function wl(){try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen');}catch(e){}}
wl();document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')wl();});
</script>
</body>
</html>
