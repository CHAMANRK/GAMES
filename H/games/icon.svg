<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#162040"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a020" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8a020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="50%" stop-color="#e8a020"/>
      <stop offset="100%" stop-color="#c07010"/>
    </linearGradient>
    <linearGradient id="tiger" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9a00"/>
      <stop offset="100%" stop-color="#e06000"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Glow effect center -->
  <ellipse cx="256" cy="220" rx="180" ry="160" fill="url(#glow)"/>

  <!-- Gold border ring -->
  <rect x="18" y="18" width="476" height="476" rx="96" fill="none"
        stroke="url(#border)" stroke-width="10" opacity="0.9"/>

  <!-- Inner thin border -->
  <rect x="30" y="30" width="452" height="452" rx="86" fill="none"
        stroke="#e8d5a3" stroke-width="2" opacity="0.2"/>

  <!-- === TIGER FACE === -->
  <!-- Tiger head main -->
  <ellipse cx="256" cy="230" rx="130" ry="120" fill="url(#tiger)"/>

  <!-- Forehead lighter -->
  <ellipse cx="256" cy="175" rx="90" ry="55" fill="#ffb030" opacity="0.6"/>

  <!-- White face panels -->
  <ellipse cx="256" cy="270" rx="70" ry="60" fill="#fff8e8"/>

  <!-- Left cheek -->
  <ellipse cx="185" cy="255" rx="42" ry="36" fill="#fff0d0" opacity="0.85"/>
  <!-- Right cheek -->
  <ellipse cx="327" cy="255" rx="42" ry="36" fill="#fff0d0" opacity="0.85"/>

  <!-- === EARS === -->
  <!-- Left ear outer -->
  <path d="M148,148 L120,90 L185,128 Z" fill="#e07000"/>
  <!-- Left ear inner -->
  <path d="M150,142 L130,103 L175,130 Z" fill="#ff3050" opacity="0.7"/>
  <!-- Right ear outer -->
  <path d="M364,148 L392,90 L327,128 Z" fill="#e07000"/>
  <!-- Right ear inner -->
  <path d="M362,142 L382,103 L337,130 Z" fill="#ff3050" opacity="0.7"/>

  <!-- === EYES === -->
  <!-- Left eye white -->
  <ellipse cx="210" cy="215" rx="28" ry="22" fill="#fffde0"/>
  <!-- Right eye white -->
  <ellipse cx="302" cy="215" rx="28" ry="22" fill="#fffde0"/>
  <!-- Left iris -->
  <ellipse cx="210" cy="217" rx="18" ry="20" fill="#40c040"/>
  <!-- Right iris -->
  <ellipse cx="302" cy="217" rx="18" ry="20" fill="#40c040"/>
  <!-- Left pupil -->
  <ellipse cx="211" cy="217" rx="7" ry="14" fill="#101010"/>
  <!-- Right pupil -->
  <ellipse cx="303" cy="217" rx="7" ry="14" fill="#101010"/>
  <!-- Eye shine left -->
  <circle cx="215" cy="210" r="4" fill="white" opacity="0.9"/>
  <!-- Eye shine right -->
  <circle cx="307" cy="210" r="4" fill="white" opacity="0.9"/>

  <!-- === NOSE === -->
  <path d="M244,258 Q256,270 268,258 Q256,252 244,258 Z" fill="#c03040"/>
  <ellipse cx="256" cy="256" rx="14" ry="10" fill="#d04050"/>

  <!-- Nose bridge line -->
  <line x1="256" y1="235" x2="256" y2="253" stroke="#c06020" stroke-width="3" stroke-linecap="round"/>

  <!-- === STRIPES === -->
  <!-- Forehead center stripe -->
  <path d="M256,148 Q260,165 256,182 Q252,165 256,148 Z" fill="#7a3800" opacity="0.55"/>
  <!-- Forehead left stripe -->
  <path d="M218,153 Q224,168 219,182 Q213,168 218,153 Z" fill="#7a3800" opacity="0.45" transform="rotate(-15,218,167)"/>
  <!-- Forehead right stripe -->
  <path d="M294,153 Q300,168 295,182 Q289,168 294,153 Z" fill="#7a3800" opacity="0.45" transform="rotate(15,294,167)"/>

  <!-- Cheek whisker dots left -->
  <circle cx="168" cy="258" r="4" fill="#7a3800" opacity="0.5"/>
  <circle cx="168" cy="272" r="4" fill="#7a3800" opacity="0.5"/>
  <circle cx="168" cy="286" r="4" fill="#7a3800" opacity="0.5"/>
  <!-- Cheek whisker dots right -->
  <circle cx="344" cy="258" r="4" fill="#7a3800" opacity="0.5"/>
  <circle cx="344" cy="272" r="4" fill="#7a3800" opacity="0.5"/>
  <circle cx="344" cy="286" r="4" fill="#7a3800" opacity="0.5"/>

  <!-- Mouth lines -->
  <path d="M256,268 Q238,282 228,276" fill="none" stroke="#c03040" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M256,268 Q274,282 284,276" fill="none" stroke="#c03040" stroke-width="2.5" stroke-linecap="round"/>

  <!-- === HINDI TEXT देसी खेल at bottom === -->
  <!-- Text background pill -->
  <rect x="136" y="388" width="240" height="68" rx="34" fill="#e8a020" opacity="0.15"/>
  <rect x="138" y="390" width="236" height="64" rx="32" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.4"/>

  <text x="256" y="433" font-family="serif" font-size="38" font-weight="bold"
        text-anchor="middle" fill="#e8d5a3"
        style="font-family: 'Noto Sans Devanagari', serif;">देसी खेल</text>
</svg>