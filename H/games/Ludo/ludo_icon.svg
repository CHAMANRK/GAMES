<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#cc7700"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Gold outer border -->
  <rect x="14" y="14" width="484" height="484" rx="98" fill="none" stroke="url(#gold)" stroke-width="10" opacity="0.95"/>
  <!-- Inner thin border -->
  <rect x="26" y="26" width="460" height="460" rx="87" fill="none" stroke="#ffe066" stroke-width="2" opacity="0.2"/>

  <!-- ══ LUDO BOARD ══ -->
  <!-- White board base -->
  <rect x="72" y="72" width="368" height="368" rx="10" fill="#f0ede0"/>

  <!-- 4 colored home zones (corners) -->
  <!-- Red (top-left) -->
  <rect x="72" y="72" width="148" height="148" rx="10" fill="#e53935"/>
  <rect x="92" y="92" width="108" height="108" rx="6" fill="#ffcdd2"/>
  <!-- Green (top-right) -->
  <rect x="292" y="72" width="148" height="148" rx="10" fill="#43a047"/>
  <rect x="312" y="92" width="108" height="108" rx="6" fill="#c8e6c9"/>
  <!-- Yellow (bottom-left) -->
  <rect x="72" y="292" width="148" height="148" rx="10" fill="#fb8c00"/>
  <rect x="92" y="312" width="108" height="108" rx="6" fill="#ffe0b2"/>
  <!-- Blue (bottom-right) -->
  <rect x="292" y="292" width="148" height="148" rx="10" fill="#1e88e5"/>
  <rect x="312" y="312" width="108" height="108" rx="6" fill="#bbdefb"/>

  <!-- Center cross paths (white) -->
  <!-- Horizontal strip -->
  <rect x="72" y="215" width="368" height="82" fill="#f0ede0"/>
  <!-- Vertical strip -->
  <rect x="215" y="72" width="82" height="368" fill="#f0ede0"/>

  <!-- Colored path arrows in cross -->
  <!-- Red path (left horizontal) -->
  <rect x="78" y="221" width="137" height="70" fill="#ffcdd2"/>
  <!-- Green path (right horizontal) -->
  <rect x="297" y="221" width="137" height="70" fill="#c8e6c9"/>
  <!-- Yellow path (bottom vertical) -->
  <rect x="221" y="297" width="70" height="137" fill="#ffe0b2"/>
  <!-- Blue path (top vertical) -->
  <rect x="221" y="78" width="70" height="137" fill="#bbdefb"/>

  <!-- Center winning square -->
  <polygon points="256,215 297,256 256,297 215,256" fill="#e53935"/>
  <polygon points="256,215 297,256 256,256 215,256" fill="#e53935"/>
  <!-- 4 triangles -->
  <polygon points="215,215 297,215 256,256" fill="#e53935"/>
  <polygon points="297,215 297,297 256,256" fill="#43a047"/>
  <polygon points="297,297 215,297 256,256" fill="#1e88e5"/>
  <polygon points="215,297 215,215 256,256" fill="#fb8c00"/>

  <!-- ══ TOKENS (big, prominent) ══ -->
  <!-- Red token top-left home -->
  <circle cx="146" cy="146" r="28" fill="#c62828" stroke="white" stroke-width="4"/>
  <circle cx="146" cy="146" r="18" fill="#ef9a9a"/>
  <circle cx="146" cy="146" r="9" fill="#c62828"/>

  <!-- Green token top-right home -->
  <circle cx="366" cy="146" r="28" fill="#2e7d32" stroke="white" stroke-width="4"/>
  <circle cx="366" cy="146" r="18" fill="#a5d6a7"/>
  <circle cx="366" cy="146" r="9" fill="#2e7d32"/>

  <!-- Yellow token bottom-left home -->
  <circle cx="146" cy="366" r="28" fill="#e65100" stroke="white" stroke-width="4"/>
  <circle cx="146" cy="366" r="18" fill="#ffcc80"/>
  <circle cx="146" cy="366" r="9" fill="#e65100"/>

  <!-- Blue token bottom-right home -->
  <circle cx="366" cy="366" r="28" fill="#1565c0" stroke="white" stroke-width="4"/>
  <circle cx="366" cy="366" r="18" fill="#90caf9"/>
  <circle cx="366" cy="366" r="9" fill="#1565c0"/>

  <!-- ══ "LUDO" TEXT ══ -->
  <rect x="180" y="420" width="152" height="50" rx="25" fill="#ffaa00" opacity="0.15"/>
  <rect x="182" y="422" width="148" height="46" rx="23" fill="none" stroke="#ffe066" stroke-width="1.5" opacity="0.5"/>
  <text x="256" y="453" font-family="'Georgia', serif" font-size="26" font-weight="bold"
        text-anchor="middle" fill="#ffe066" letter-spacing="4">LUDO</text>

  <!-- Dice icon top center -->
  <rect x="228" y="30" width="56" height="56" rx="10" fill="white" opacity="0.9"/>
  <rect x="231" y="33" width="50" height="50" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <circle cx="244" cy="46" r="5" fill="#1a1a3e"/>
  <circle cx="268" cy="46" r="5" fill="#1a1a3e"/>
  <circle cx="256" cy="58" r="5" fill="#1a1a3e"/>
  <circle cx="244" cy="70" r="5" fill="#1a1a3e"/>
  <circle cx="268" cy="70" r="5" fill="#1a1a3e"/>
</svg>