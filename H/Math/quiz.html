<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="level-screen">
        <h2>Select Level</h2>
        <button class="btn-start" onclick="startLevel('Easy')">Easy (Numbers 1-50)</button>
        <button class="btn-submit" onclick="startLevel('Medium')">Medium (BODMAS & Div)</button>
        <button class="btn-home" style="background:#d63031;" onclick="startLevel('Hard')">Hard (Algebra & %)</button>
        <button class="btn-home" onclick="location.href='index.html'">⬅ Back</button>
    </div>

    <div class="container hidden" id="game-screen">
        <div style="display:flex; justify-content:space-between; font-size:14px;">
            <span>🏆 Score: <span id="score">0</span></span>
            <span id="level-badge" style="background:#fff; color:#333; padding:2px 8px; border-radius:10px;">Easy</span>
        </div>
        
        <div style="width:100%; background:#ccc; height:5px; margin-top:10px; border-radius:5px;">
            <div id="timer-bar" style="width:100%; background:#00b894; height:100%; border-radius:5px; transition: width 1s linear;"></div>
        </div>

        <h2 id="question" style="font-size: 28px; margin: 30px 0; font-family: monospace;">Loading...</h2>
        
        <input type="number" id="answer" placeholder="Your Answer">
        
        <button class="btn-submit" onclick="checkAnswer()">Submit Answer</button>
        <button class="btn-hint" onclick="getHint()">💡 Hint (-2 pts)</button>
        <p id="msg" style="min-height: 20px; font-weight:bold;"></p>

        <button class="btn-home" onclick="location.href='index.html'">Exit</button>
    </div>

    <script>
        let currentLevel = '';
        let currentAns = 0;
        let score = 0;
        let hintUsed = false;
        let qType = ''; // To store type for specific hints

        function speak(text) {
            window.speechSynthesis.cancel(); // Stop previous sound
            let msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.1; // Thoda tez bolega
            window.speechSynthesis.speak(msg);
        }

        function startLevel(level) {
            currentLevel = level;
            document.getElementById('level-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('level-badge').innerText = level;
            generateQuestion();
        }

        function generateQuestion() {
            hintUsed = false;
            document.getElementById('answer').value = '';
            document.getElementById('msg').innerText = '';
            
            let n1, n2, n3, qText;

            // --- IMPROVED LOGIC ---
            
            // LEVEL 1: EASY (1-50, Add/Sub/Small Multiply)
            if (currentLevel === 'Easy') {
                let type = Math.random();
                if(type < 0.4) { // Addition
                    n1 = r(50); n2 = r(40);
                    qText = `${n1} + ${n2}`;
                    currentAns = n1 + n2;
                    qType = "add";
                } else if (type < 0.8) { // Subtraction
                    n1 = r(50) + 10; n2 = r(n1); // n2 always smaller
                    qText = `${n1} - ${n2}`;
                    currentAns = n1 - n2;
                    qType = "sub";
                } else { // Simple Multiply
                    n1 = r(10); n2 = r(5);
                    qText = `${n1} × ${n2}`;
                    currentAns = n1 * n2;
                    qType = "mul";
                }
            } 
            
            // LEVEL 2: MEDIUM (Division, BODMAS, Squares)
            else if (currentLevel === 'Medium') {
                let type = Math.random();
                if(type < 0.3) { // Perfect Division
                    n2 = r(12) + 2; // Divisor
                    currentAns = r(12) + 1; // Answer
                    n1 = n2 * currentAns; // Dividend
                    qText = `${n1} ÷ ${n2}`;
                    qType = "div";
                } else if (type < 0.6) { // BODMAS: 5 + 2 * 3
                    n1 = r(20); n2 = r(10); n3 = r(5) + 1;
                    qText = `${n1} + ${n2} × ${n3}`;
                    currentAns = n1 + (n2 * n3);
                    qType = "bodmas";
                } else { // Squares
                    n1 = r(20) + 2;
                    qText = `${n1}² (Square)`;
                    currentAns = n1 * n1;
                    qType = "sq";
                }
            } 
            
            // LEVEL 3: HARD (Algebra, Percentage, Hard Math)
            else {
                let type = Math.random();
                if(type < 0.4) { // Algebra: 3x + 5 = 20
                    let x = r(15) + 1;
                    let m = r(5) + 2;
                    let c = r(50);
                    let rhs = (m * x) + c;
                    qText = `Solve x: ${m}x + ${c} = ${rhs}`;
                    currentAns = x;
                    qType = "alg";
                } else if (type < 0.7) { // Percentage: 20% of 500
                    let p = r(9) * 10; // 10, 20, 30...
                    let total = r(20) * 10; // 100, 200...
                    qText = `${p}% of ${total}`;
                    currentAns = (p / 100) * total;
                    qType = "perc";
                } else { // Hard Subtraction
                    n1 = r(500) + 100; n2 = r(200);
                    qText = `${n1} - ${n2}`;
                    currentAns = n1 - n2;
                    qType = "hardsub";
                }
            }

            document.getElementById('question').innerText = qText;
        }

        // Helper: Random Number generator
        function r(max) {
            return Math.floor(Math.random() * max) + 1;
        }

        function checkAnswer() {
            let userVal = parseFloat(document.getElementById('answer').value);
            if (userVal === currentAns) {
                speak("Correct Answer!");
                document.getElementById('msg').innerHTML = "<span style='color:#00ff00'>✅ Correct!</span>";
                score += hintUsed ? 2 : 5;
                document.getElementById('score').innerText = score;
                setTimeout(generateQuestion, 1500);
            } else {
                speak("Wrong");
                document.getElementById('msg').innerHTML = "<span style='color:#ff4757'>❌ Wrong</span>";
                score = Math.max(0, score - 1); // Score can't go below 0
                document.getElementById('score').innerText = score;
            }
        }

        // --- NEW HINT LOGIC ---
        function getHint() {
            if(score < 2) {
                alert("Need 2 points for hint!");
                return;
            }
            hintUsed = true;
            score -= 2;
            document.getElementById('score').innerText = score;
            
            let h = "";
            switch(qType) {
                case 'add': h = "Count forward from the bigger number."; break;
                case 'sub': h = "Think: What number added to the smaller one gives the big one?"; break;
                case 'mul': h = "It is repeated addition."; break;
                case 'div': h = "Read the multiplication table of the second number."; break;
                case 'bodmas': h = "Multiply first, then Add (Rule of BODMAS)."; break;
                case 'sq': h = "Multiply the number by itself."; break;
                case 'alg': h = "Subtract the constant number from the result first."; break;
                case 'perc': h = "Percent means 'per 100'. Multiply and divide by 100."; break;
                default: h = "Try breaking the problem into smaller parts.";
            }
            document.getElementById('msg').innerText = "💡 " + h;
        }
    </script>
</body>
</html>
