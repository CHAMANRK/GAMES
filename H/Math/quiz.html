<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="level-screen">
        <h2>Select Your Class Level</h2>
        <button class="btn-start" onclick="startLevel('Easy')">Easy (Class 1-4)</button>
        <button class="btn-submit" onclick="startLevel('Medium')">Medium (Class 5-8)</button>
        <button class="btn-home" style="background:#d63031;" onclick="startLevel('Hard')">Hard (Class 9-10)</button>
        <button class="btn-home" onclick="location.href='index.html'">⬅ Back</button>
    </div>

    <div class="container hidden" id="game-screen">
        <div style="display:flex; justify-content:space-between;">
            <span>⭐ Score: <span id="score">0</span></span>
            <span id="level-badge">Easy</span>
        </div>
        
        <h2 id="question" style="font-size: 32px; margin: 30px 0;">Loading...</h2>
        
        <input type="number" id="answer" placeholder="Your Answer">
        
        <button class="btn-submit" onclick="checkAnswer()">Submit</button>
        <button class="btn-hint" onclick="getHint()">💡 Get Hint (-2 pts)</button>
        <p id="msg"></p>

        <button class="btn-home" onclick="location.href='index.html'">Exit Game</button>
    </div>

    <script>
        let currentLevel = '';
        let currentAns = 0;
        let score = 0;
        let hintUsed = false;

        // Sound System (Text to Speech - No files needed)
        function speak(text) {
            let msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
        }

        function startLevel(level) {
            currentLevel = level;
            document.getElementById('level-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('level-badge').innerText = level;
            generateQuestion();
        }

        function generateQuestion() {
            hintUsed = false;
            document.getElementById('answer').value = '';
            document.getElementById('msg').innerText = '';
            
            let n1, n2, op, qText;

            // --- Logic for Levels ---
            if (currentLevel === 'Easy') {
                // Class 1-4: Basic + - *
                n1 = Math.floor(Math.random() * 20) + 1;
                n2 = Math.floor(Math.random() * 10) + 1;
                op = Math.random() > 0.5 ? '+' : '-';
                currentAns = (op === '+') ? n1 + n2 : n1 - n2;
                qText = `${n1} ${op} ${n2}`;
            } 
            else if (currentLevel === 'Medium') {
                // Class 5-8: Squares, Multiplication, BODMAS
                n1 = Math.floor(Math.random() * 15) + 2;
                n2 = Math.floor(Math.random() * 10) + 2;
                if(Math.random() > 0.5){
                    qText = `${n1} × ${n2}`;
                    currentAns = n1 * n2;
                } else {
                    qText = `Square of ${n1}`;
                    currentAns = n1 * n1;
                }
            } 
            else {
                // Class 9-10: Algebra Logic (Find X)
                // Example: 2x + 5 = 15. What is x?
                let x = Math.floor(Math.random() * 10) + 1; // The answer
                let m = Math.floor(Math.random() * 5) + 2;  // Multiplier
                let c = Math.floor(Math.random() * 20) + 1; // Constant
                let rhs = (m * x) + c;
                qText = `Solve x:  ${m}x + ${c} = ${rhs}`;
                currentAns = x;
            }

            document.getElementById('question').innerText = qText;
        }

        function checkAnswer() {
            let userVal = parseFloat(document.getElementById('answer').value);
            
            if (userVal === currentAns) {
                speak("Correct!"); // Sound
                document.getElementById('msg').innerHTML = "<span style='color:#00ff00'>✅ Awesome!</span>";
                score += hintUsed ? 2 : 5; // Less points if hint used
                setTimeout(generateQuestion, 1500);
            } else {
                speak("Try again"); // Sound
                document.getElementById('msg').innerHTML = "<span style='color:#ff4757'>❌ Wrong</span>";
                score -= 1;
            }
            document.getElementById('score').innerText = score;
        }

        function getHint() {
            if(score < 2) {
                alert("Not enough points for hint!");
                return;
            }
            hintUsed = true;
            score -= 2;
            document.getElementById('score').innerText = score;
            
            if(currentLevel === 'Hard') {
                document.getElementById('msg').innerText = "Hint: Move the constant number to the other side first.";
            } else {
                document.getElementById('msg').innerText = "Hint: The answer is near " + (currentAns - 1);
            }
        }
    </script>
</body>
</html>
