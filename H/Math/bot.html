<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Math Tutor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Chat UI Improvements */
        .chat-container { height: 450px; display: flex; flex-direction: column; }
        .chat-box { flex-grow: 1; overflow-y: auto; background: #ece5dd; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-radius: 10px; }
        
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .bot-msg { background: #ffffff; color: #000; align-self: flex-start; border-top-left-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .user-msg { background: #dcf8c6; color: #000; align-self: flex-end; border-top-right-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        .typing { font-style: italic; color: #666; font-size: 12px; margin-left: 10px; display: none; }
    </style>
</head>
<body>

    <div class="container chat-container">
        <div style="text-align:left; padding-bottom:10px; border-bottom:1px solid #ddd; margin-bottom:10px;">
            <h2 style="margin:0; color:#fff;">🤖 AI Professor</h2>
            <small style="color:#eee;">Powered by NAJIFUL ISLAM</small>
        </div>
        
        <div class="chat-box" id="chat">
            <div class="msg bot-msg">👋 ASSALAM ALAIKUM! I am your Math Teacher. <br>Ask me to explain formulas, solve equations, or clear doubts.</div>
        </div>
        <div id="loading" class="typing">AI is thinking...</div>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="userInput" placeholder="Ask doubt (e.g., Explain Pythagoras)..." onkeypress="handleEnter(event)">
            <button class="btn-submit" onclick="sendMessage()" style="width:60px; margin:0; border-radius:50%;">➤</button>
        </div>
        
        <button class="btn-home" onclick="location.href='index.html'" style="margin-top:10px;">⬅ Back</button>
    </div>

    <script>
        // 👇👇 YAHAN APNI KEY PASTE KARO 👇👇
        const API_KEY = "AIzaSyBkT1w5_MKhCFf0LfdNnFMfIGbPLcLcq3M"; 

        const chatBox = document.getElementById('chat');
        const loadingInd = document.getElementById('loading');

        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            let input = document.getElementById('userInput').value.trim();
            if(!input) return;

            // 1. User Message Show Karo
            addMsg(input, 'user-msg');
            document.getElementById('userInput').value = '';
            
            // 2. Loading dikhao
            loadingInd.style.display = 'block';

            // 3. AI se poocho
            // --- UPDATED GEMINI API FUNCTION (Debugging Wala) ---
        async function askGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const data = {
                contents: [{
                    parts: [{ 
                        text: `You are a helpful Math Teacher. User Question: "${prompt}". Keep it short and simple.` 
                    }]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                // Check for Google API Errors
                if (!response.ok) {
                    // Agar error hai to screen par dikhao
                    throw new Error(result.error.message || "API Error");
                }

                return result.candidates[0].content.parts[0].text;

            } catch (error) {
                // Asli error user ko dikhao
                return "⚠️ Error Details: " + error.message;
            }
        }
            

        function addMsg(text, className) {
            let div = document.createElement('div');
            div.className = `msg ${className}`;
            // Convert **bold** to <b>bold</b> for display
            div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function speak(text) {
            // Speak short summary
            let cleanText = text.replace(/[*#]/g, ''); 
            if(cleanText.length < 200) {
                let msg = new SpeechSynthesisUtterance(cleanText);
                window.speechSynthesis.speak(msg);
            }
        }

        // --- GEMINI API FUNCTION ---
        async function askGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const data = {
                contents: [{
                    parts: [{ 
                        text: `You are a helpful Math Teacher for school students. 
                        User Question: "${prompt}".
                        Instructions:
                        1. Explain simply in short paragraphs.
                        2. If it's a formula, show usage.
                        3. If it's a calculation, show steps.
                        4. Use Bold (**text**) for important terms.` 
                    }]
                }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            return result.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
