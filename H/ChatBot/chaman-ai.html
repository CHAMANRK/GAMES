<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chaman</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#07070a;--surf:#0f0f14;--panel:#13131a;--bdr:rgba(255,255,255,0.06);
            --acc:#c8f04d;--acc2:#4df0c8;--txt:#e8e8f0;--mut:#555568;
            --ubub:#1a1a28;--abub:#0d1a0d;
            --oa:#f0a84d;--oa2:#f04d8a;--obg:#0a0805;--osurf:#12100a;--opnl:#1a1508;--oabub:#1a1208;
        }
        html,body{height:100%;width:100%}
        body{background:var(--bg);font-family:'DM Mono',monospace;color:var(--txt);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;transition:background 0.5s;margin:0;padding:0}
        body.om{--bg:var(--obg);--surf:var(--osurf);--panel:var(--opnl);--acc:var(--oa);--acc2:var(--oa2);--abub:var(--oabub)}
        #cv{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.25}
        .blob{position:fixed;border-radius:50%;filter:blur(130px);opacity:0.08;pointer-events:none;animation:drift 16s ease-in-out infinite alternate}
        .b1{width:520px;height:520px;background:var(--acc);top:-160px;left:-120px}
        .b2{width:420px;height:420px;background:var(--acc2);bottom:-120px;right:-80px;animation-delay:-8s}
        @keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(35px,25px) scale(1.07)}}
        
        .shell{position:relative;z-index:1;width:100%;max-width:700px;height:100vh;display:flex;flex-direction:column;border-left:1px solid var(--bdr);border-right:1px solid var(--bdr);background:var(--surf);transition:background 0.5s;box-shadow:0 0 20px rgba(0,0,0,0.5)}
        
        header{padding:13px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);background:var(--panel);flex-shrink:0;transition:background 0.4s}
        .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--acc);transition:color 0.4s}
        .hr{display:flex;align-items:center;gap:10px}
        .badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid rgba(200,240,77,.3);color:var(--acc);background:rgba(200,240,77,.05);transition:all .4s}
        .om .badge{border-color:rgba(240,168,77,.4);color:var(--oa);background:rgba(240,168,77,.08)}
        .spill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mut)}
        .dot{width:7px;height:7px;background:var(--acc);border-radius:50%;animation:pulse 2s ease-in-out infinite;transition:background .4s}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,240,77,.4)}50%{box-shadow:0 0 0 5px rgba(200,240,77,0)}}
        .om .dot{background:var(--oa)}
        
        .opnl{background:var(--panel);border-bottom:1px solid var(--bdr);max-height:0;overflow:hidden;transition:max-height .45s ease;flex-shrink:0}
        .opnl.open{max-height:560px;overflow-y:auto}
        .otabs{display:flex;border-bottom:1px solid var(--bdr);padding:0 14px;position:sticky;top:0;background:var(--panel);z-index:2}
        .otab{padding:9px 11px;font-size:10px;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.05em;text-transform:uppercase;transition:all .2s;white-space:nowrap}
        .otab.on{color:var(--oa);border-bottom-color:var(--oa)}
        .otc{display:none;padding:14px 16px;max-height:400px;overflow-y:auto}
        .otc.on{display:block}
        .otit{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--oa);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
        
        .of{margin-bottom:12px}
        .of label{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px}
        .of input,.of textarea,.of select{width:100%;background:var(--surf);border:1px solid var(--bdr);color:var(--txt);padding:7px 10px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .2s}
        .of input:focus,.of textarea:focus,.of select:focus{border-color:rgba(240,168,77,.4)}
        .of textarea{resize:vertical;min-height:60px}
        
        .oacts{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
        .obtn{padding:7px 13px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;border:none;transition:all .2s}
        .obtn.sv{background:var(--oa);color:#07070a}.obtn.sv:hover{opacity:.88}
        .obtn.dng{background:transparent;border:1px solid rgba(240,77,77,.3);color:#f07070}.obtn.dng:hover{background:rgba(240,77,77,.08)}
        .obtn.sc{background:transparent;border:1px solid var(--bdr);color:var(--mut)}.obtn.sc:hover{border-color:rgba(240,168,77,.3);color:var(--oa)}
        .osvd{font-size:11px;color:#4df0a8;margin-left:auto;opacity:0;transition:opacity .3s}
        .osvd.show{opacity:1}
        
        .msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
        .msgs::-webkit-scrollbar{width:6px}
        .msgs::-webkit-scrollbar-track{background:var(--surf)}
        .msgs::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
        
        .msg{display:flex;gap:10px;animation:su .28s cubic-bezier(.22,1,.36,1) both}
        @keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .msg.user{flex-direction:row-reverse}
        .av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-family:'Syne',sans-serif;font-weight:700}
        .av.ai{background:linear-gradient(135deg,#1a2e1a,#0f2020);border:1px solid rgba(77,240,200,.2);color:var(--acc2)}
        .om .av.ai{background:linear-gradient(135deg,#2a1a08,#1a1008);border-color:rgba(240,168,77,.2);color:var(--oa)}
        .av.u{background:linear-gradient(135deg,#1e1e0f,#2a2a10);border:1px solid rgba(200,240,77,.2);color:var(--acc)}
        .mw{display:flex;flex-direction:column;gap:5px;max-width:80%}
        .msg.user .mw{align-items:flex-end}
        .bub{padding:11px 15px;border-radius:14px;font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
        .msg.ai .bub{background:var(--abub);border:1px solid rgba(77,240,200,.1);border-top-left-radius:4px;color:#c8e8d8;transition:background .4s}
        .om .msg.ai .bub{border-color:rgba(240,168,77,.1);color:#e8d8b8}
        .msg.user .bub{background:var(--ubub);border:1px solid rgba(200,240,77,.1);border-top-right-radius:4px;color:#d8d8b8;text-align:right}
        
        .welcome{text-align:center;padding:40px 20px;animation:fi .6s ease both}
        @keyframes fi{from{opacity:0}to{opacity:1}}
        .welcome h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--acc);margin-bottom:6px}
        .welcome p{font-size:12.5px;color:var(--mut);line-height:1.6}
        .suggs{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:16px}
        .sg{background:var(--panel);border:1px solid var(--bdr);color:var(--mut);padding:6px 13px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11.5px;cursor:pointer;transition:all .2s}
        .sg:hover{border-color:rgba(200,240,77,.3);color:var(--acc)}
        
        .iarea{padding:12px 18px;border-top:1px solid var(--bdr);background:var(--panel);flex-shrink:0;transition:background 0.4s}
        .irow{display:flex;gap:8px;align-items:flex-end;background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:9px 11px;transition:border-color .2s}
        .irow:focus-within{border-color:rgba(200,240,77,.3)}
        .om .irow:focus-within{border-color:rgba(240,168,77,.4)}
        #inp{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:'DM Mono',monospace;font-size:13.5px;resize:none;line-height:1.5;max-height:140px;min-height:22px}
        #inp::placeholder{color:var(--mut)}
        
        .iacts{display:flex;gap:6px;align-items:center}
        .ibtn{width:34px;height:34px;background:transparent;border:1px solid var(--bdr);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mut);transition:all .2s;flex-shrink:0}
        .ibtn:hover{border-color:rgba(200,240,77,.3);color:var(--acc)}
        .sndbtn{width:34px;height:34px;background:var(--acc);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#07070a;transition:all .2s}
        .sndbtn:hover{opacity:.88;transform:scale(1.05)}.sndbtn:active{transform:scale(.96)}
        .sndbtn:disabled{background:var(--mut);cursor:not-allowed}
        
        .hint{font-size:10.5px;color:var(--mut);text-align:center;margin-top:8px}
        
        .mov{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
        .mov.hidden{display:none}
        .modal{background:#13131a;border:1px solid rgba(240,168,77,.2);border-radius:18px;padding:30px 26px;width:min(360px,90vw);text-align:center;animation:pu .3s cubic-bezier(.22,1,.36,1) both}
        @keyframes pu{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
        .mico{font-size:34px;margin-bottom:10px}
        .modal h3{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--oa);margin-bottom:5px}
        .modal p{font-size:12px;color:var(--mut);margin-bottom:18px}
        .pki{width:100%;background:var(--surf);border:1px solid rgba(240,168,77,.2);color:var(--txt);padding:11px 14px;border-radius:10px;font-family:'DM Mono',monospace;font-size:16px;letter-spacing:.15em;text-align:center;outline:none;margin-bottom:10px}
        .pki:focus{border-color:rgba(240,168,77,.5)}
        .pki.wrong{border-color:#f04d4d;animation:shake .4s}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
        .mbtns{display:flex;gap:8px}
        .mbtn{flex:1;padding:10px;border-radius:10px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;border:none;transition:all .2s}
        .mbtn.ok{background:var(--oa);color:#07070a}.mbtn.ok:hover{opacity:.88}
        .mbtn.no{background:transparent;border:1px solid var(--bdr);color:var(--mut)}
        .em{font-size:11px;color:#f04d4d;margin-bottom:8px;min-height:16px}
        
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a28;border:1px solid var(--bdr);border-radius:20px;padding:8px 18px;font-size:12px;color:var(--txt);opacity:0;transition:all .3s;z-index:200;pointer-events:none}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>
    <canvas id="cv"></canvas>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="toast" id="toast"></div>

    <div class="mov" id="modal">
        <div class="modal">
            <div class="mico">🔐</div>
            <h3>Chaman Mode</h3>
            <p>Apna passkey enter karo</p>
            <input class="pki" id="pki" type="password" placeholder="••••••••" maxlength="30"/>
            <div class="em" id="em"></div>
            <div class="mbtns">
                <button class="mbtn no" id="cancelBtn">Cancel</button>
                <button class="mbtn ok" id="unlockBtn">Unlock 🔓</button>
            </div>
        </div>
    </div>

    <div class="shell">
        <header>
            <div class="logo">Chaman</div>
            <div class="hr">
                <div class="badge" id="badge">Public</div>
                <div class="spill"><div class="dot"></div> online</div>
            </div>
        </header>

        <div class="opnl" id="opnl">
            <div class="otabs">
                <div class="otab on" id="tab-settings">⚙️ Settings</div>
                <div class="otab" id="tab-memory">🧠 Memory</div>
                <div class="otab" id="tab-security">🔑 Security</div>
            </div>
            
            <div class="otc on" id="ot-settings">
                <div class="of">
                    <label>System Instruction</label>
                    <textarea id="fSys" placeholder="E.g. Hamesha naam poochho..."></textarea>
                </div>
                <div class="of">
                    <label>Response Style</label>
                    <select id="fStyle">
                        <option value="normal">Normal (Hinglish+Fun)</option>
                        <option value="brutal">Brutal Honest</option>
                        <option value="formal">Formal & Pro</option>
                        <option value="short">Ultra Short</option>
                    </select>
                </div>
                <div class="of">
                    <label>Language</label>
                    <select id="fLang">
                        <option value="hinglish">Hinglish</option>
                        <option value="hindi">Pure Hindi</option>
                        <option value="english">English</option>
                    </select>
                </div>
                <div class="oacts">
                    <button class="obtn sv" id="saveBtn">Save ✓</button>
                    <button class="obtn sc" id="resetBtn">Reset</button>
                    <span class="osvd" id="osvd">Saved!</span>
                </div>
            </div>

            <div class="otc" id="ot-memory">
                <div class="otit">Permanent Memory</div>
                <div style="margin-bottom:10px">
                    <textarea id="minp" placeholder="E.g. Mera naam Chaman hai..." style="width:100%;padding:8px;border-radius:6px;border:1px solid rgba(200,240,77,.2);background:var(--surf);color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;min-height:60px;resize:vertical"></textarea>
                    <button class="obtn sv" id="addMemBtn" style="margin-top:8px;width:100%">+ Add Memory</button>
                </div>
                <div id="memList" style="margin-bottom:10px"></div>
                <button class="obtn dng" id="clearMemBtn" style="width:100%">Clear All</button>
            </div>

            <div class="otc" id="ot-security">
                <div class="of">
                    <label>Current Passkey</label>
                    <input type="password" id="pkOld" placeholder="Current passkey" maxlength="30"/>
                </div>
                <div class="of">
                    <label>New Passkey</label>
                    <input type="password" id="pkNew" placeholder="New passkey" maxlength="30"/>
                </div>
                <div class="oacts">
                    <button class="obtn sv" id="pkBtn">Update Passkey</button>
                </div>
                <div class="pkmsg" id="pkmsg"></div>
                <div style="margin-top:16px;padding-top:10px;border-top:1px solid var(--bdr)">
                    <div class="otit">Danger Zone</div>
                    <button class="obtn dng" id="nukeBtn" style="width:100%">Clear All Data</button>
                </div>
            </div>
        </div>

        <div class="msgs" id="msgs">
            <div class="welcome" id="welcome">
                <h2 id="wtitle">Hey, Main Chaman hoon! 👋</h2>
                <p id="wsub">Apna sawaal pooch — Hindi, English, ya Hinglish mein.</p>
                <div class="suggs" id="suggBox">
                    <button class="sg">YouTube script likh do</button>
                    <button class="sg">Koi business idea do</button>
                    <button class="sg">Mujhe motivate karo</button>
                    <button class="sg">Coding mein help chahiye</button>
                </div>
            </div>
        </div>

        <div class="iarea">
            <div class="irow">
                <textarea id="inp" placeholder="Kuch bhi pooch…" rows="1"></textarea>
                <div class="iacts">
                    <button class="ibtn" id="micBtn" title="Voice">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                    </button>
                    <button class="sndbtn" id="sendBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
            <p class="hint">Enter to send · Shift+Enter new line · <span id="hintLink" style="cursor:pointer;text-decoration:underline">🔐 Owner login</span></p>
        </div>
    </div>

    <script>
        // ====================
        // DATA MANAGEMENT
        // ====================
        const DB_KEY = 'chaman_data';
        const PASSKEY = 'chaman123'; // Default passkey

        function getDB() {
            return JSON.parse(localStorage.getItem(DB_KEY)) || {
                passkey: PASSKEY,
                systemInstruction: '',
                overrideAnswer: '',
                style: 'normal',
                lang: 'hinglish',
                memory: [],
                isPrivate: false,
                publicMsgs: [],
                privateMsgs: [],
                publicStats: { msgs: 0, sessions: 0, today: 0 }
            };
        }

        function saveDB(db) {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        // ====================
        // UI ELEMENTS
        // ====================
        const modal = document.getElementById('modal');
        const pkiInput = document.getElementById('pki');
        const unlockBtn = document.getElementById('unlockBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const opnl = document.getElementById('opnl');
        const badge = document.getElementById('badge');
        const msgs = document.getElementById('msgs');
        const inp = document.getElementById('inp');
        const sendBtn = document.getElementById('sendBtn');
        const hintLink = document.getElementById('hintLink');
        const tabSettings = document.getElementById('tab-settings');
        const tabMemory = document.getElementById('tab-memory');
        const tabSecurity = document.getElementById('tab-security');

        // Settings
        const fSys = document.getElementById('fSys');
        const fStyle = document.getElementById('fStyle');
        const fLang = document.getElementById('fLang');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const osvd = document.getElementById('osvd');

        // Memory
        const minp = document.getElementById('minp');
        const addMemBtn = document.getElementById('addMemBtn');
        const clearMemBtn = document.getElementById('clearMemBtn');
        const memList = document.getElementById('memList');

        // Security
        const pkOld = document.getElementById('pkOld');
        const pkNew = document.getElementById('pkNew');
        const pkBtn = document.getElementById('pkBtn');
        const pkmsg = document.getElementById('pkmsg');
        const nukeBtn = document.getElementById('nukeBtn');

        // ====================
        // STATE
        // ====================
        // ====================
        // STATE
        // ====================
        let isPrivateMode = false;
        let isAuthenticated = false;
        let db = getDB();

        // ====================
        // AUTHENTICATION
        // ====================
        unlockBtn.addEventListener('click', () => {
            if (pkiInput.value === db.passkey) {
                isAuthenticated = true;
                isPrivateMode = true;
                modal.classList.add('hidden');
                updateUI();
                loadSettings();
            } else {
                pkiInput.classList.add('wrong');
                document.getElementById('em').textContent = 'Wrong passkey!';
                setTimeout(() => pkiInput.classList.remove('wrong'), 400);
                pkiInput.value = '';
            }
        });

        cancelBtn.addEventListener('click', () => {
            isPrivateMode = false;
            modal.classList.add('hidden');
            updateUI();
        });

        hintLink.addEventListener('click', () => {
            pkiInput.value = '';
            document.getElementById('em').textContent = '';
            modal.classList.remove('hidden');
        });

        // ====================
        // UI UPDATES
        // ====================
        function updateUI() {
            if (isPrivateMode) {
                badge.textContent = 'Private';
                opnl.classList.add('open');
                document.body.classList.add('om');
            } else {
                badge.textContent = 'Public';
                opnl.classList.remove('open');
                document.body.classList.remove('om');
            }
        }

        // ====================
        // SETTINGS TAB
        // ====================
        [tabSettings, tabMemory, tabSecurity].forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.otab').forEach(t => t.classList.remove('on'));
                document.querySelectorAll('.otc').forEach(tc => tc.classList.remove('on'));
                
                e.target.classList.add('on');
                const tabName = e.target.id.replace('tab-', '');
                document.getElementById('ot-' + tabName).classList.add('on');
            });
        });

        function loadSettings() {
            fSys.value = db.systemInstruction || '';
            fStyle.value = db.style || 'normal';
            fLang.value = db.lang || 'hinglish';
            updateMemoryDisplay();
        }

        saveBtn.addEventListener('click', () => {
            db.systemInstruction = fSys.value;
            db.style = fStyle.value;
            db.lang = fLang.value;
            saveDB(db);
            osvd.classList.add('show');
            setTimeout(() => osvd.classList.remove('show'), 2000);
        });

        resetBtn.addEventListener('click', () => {
            fSys.value = '';
            fStyle.value = 'normal';
            fLang.value = 'hinglish';
        });

        // ====================
        // MEMORY TAB
        // ====================
        function updateMemoryDisplay() {
            memList.innerHTML = '';
            db.memory.forEach((mem, i) => {
                const div = document.createElement('div');
                div.style.cssText = 'background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;font-size:12px';
                div.innerHTML = `
                    <span>${mem.substring(0, 40)}${mem.length > 40 ? '...' : ''}</span>
                    <button onclick="deleteMemory(${i})" style="background:none;border:none;color:#f07070;cursor:pointer;padding:2px 5px">✕</button>
                `;
                memList.appendChild(div);
            });
        }

        addMemBtn.addEventListener('click', () => {
            if (minp.value.trim()) {
                db.memory.push(minp.value);
                saveDB(db);
                minp.value = '';
                updateMemoryDisplay();
            }
        });

        window.deleteMemory = (i) => {
            db.memory.splice(i, 1);
            saveDB(db);
            updateMemoryDisplay();
        };

        clearMemBtn.addEventListener('click', () => {
            if (confirm('Clear all memories?')) {
                db.memory = [];
                saveDB(db);
                updateMemoryDisplay();
            }
        });

        // ====================
        // SECURITY TAB
        // ====================
        pkBtn.addEventListener('click', () => {
            if (pkOld.value === db.passkey) {
                if (pkNew.value && pkNew.value.length > 3) {
                    db.passkey = pkNew.value;
                    saveDB(db);
                    pkmsg.textContent = '✓ Passkey updated!';
                    pkmsg.style.color = '#4df0a8';
                    pkOld.value = '';
                    pkNew.value = '';
                    setTimeout(() => pkmsg.textContent = '', 2000);
                } else {
                    pkmsg.textContent = 'New passkey must be 4+ characters';
                    pkmsg.style.color = '#f07070';
                }
            } else {
                pkmsg.textContent = 'Wrong current passkey!';
                pkmsg.style.color = '#f07070';
            }
        });

        nukeBtn.addEventListener('click', () => {
            if (confirm('Delete ALL data? Yeh action reverse nahi ho sakta!')) {
                localStorage.removeItem(DB_KEY);
                location.reload();
            }
        });

        // ====================
        // CHAT FUNCTIONALITY
        // ====================
        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isUser ? 'user' : 'ai'}`;
            msgDiv.innerHTML = `
                <div class="av ${isUser ? 'u' : 'ai'}">${isUser ? '👤' : 'AI'}</div>
                <div class="mw">
                    <div class="bub">${text}</div>
                </div>
            `;
            msgs.appendChild(msgDiv);
            msgs.scrollTop = msgs.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        inp.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendMessage() {
            const text = inp.value.trim();
            if (!text) return;

            // Remove welcome
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            addMessage(text, true);
            inp.value = '';

            // Simulate bot response
            setTimeout(() => {
                let response = getResponse(text);
                addMessage(response, false);
            }, 500);
        }

        function getResponse(input) {
            const responses = {
                'hi': 'Hey! 👋 Kaise ho?',
                'hello': 'Namaste! 🙏',
                'help': 'Main kya help kar sakta hoon?',
                'how': 'Bilkul sahi! Tum kaisa ho?',
                'name': db.systemInstruction || 'Main Chaman hoon!'
            };

            for (let [key, val] of Object.entries(responses)) {
                if (input.toLowerCase().includes(key)) return val;
            }

            return `Aapne kaha: "${input}"\n\n(Yeh ek demo hai. Real bot backend se response dega)`;
        }

        // ====================
        // INIT
        // ====================
        updateUI();
        loadSettings();

        // Auto-hide modal
        setTimeout(() => {
            if (!isAuthenticated) {
                modal.classList.add('hidden');
            }
        }, 5000);
    </script>
</body>
</html>
